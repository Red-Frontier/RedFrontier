    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Surface Operations Division\nTO: Mission Control\nSUBJECT: Mun Surface Landing Mission - Historic Operations Authorization\n\nYour demonstration of orbital rendezvous validated precision spaceflight capability. The Council has analyzed your docking operations and cleared you for the most critical test: landing on another world.\n\nDeep space exploration requires proven surface operations capability. Before the Council authorizes expensive interplanetary landing missions, they must see evidence that we can execute powered descent in low gravity, operate safely on alien terrain, and return crew from another celestial body.\n\nLand on the Mun surface and conduct comprehensive scientific surveys. Plant a flag to mark this historic site - it will serve as a navigation reference for future precision landing operations. Return all crew and data safely to Kerbin.\n\nThis mission represents the culmination of everything you've learned: trajectory planning, orbital mechanics, powered descent, and surface operations. 
    
    //notes = Mission Objectives:\nExecute controlled descent and landing on Mun surface. Site selection is your choice.\n\nOnce landing operations are completed, conduct comprehensive scientific survey at landing site.
    
    synopsis = Land on the Mun surface, conduct scientific surveys, plant a flag, and return safely to Kerbin.
    
    completedMessage = Surface operations validated.\n\nRubicon 6 is now available.
    
