CONTRACT_TYPE
{
    name = PR_Mission12_ISRUDeployment
    title = Rubicon 12: "Resource Extraction"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Advanced Technology Division\nTO: Mission Control\nSUBJECT: CRITICAL - ISRU Technology Validation - Final Rubicon Authorization\n\nThe Minmus Surface Outpost is operational and represents mastery of complex surface infrastructure. The Council has completed comprehensive review of all Rubicon operations. One final capability remains to be validated before authorizing deep space missions.\n\nIn-Situ Resource Utilization is the cornerstone of sustainable deep space exploration. Transporting all fuel from Kerbin for interplanetary missions is prohibitively expensive. The Council will not authorize deep space operations without proof that you understand ISRU principles, thermal management, and resource extraction operations.\n\nDeploy ISRU drill, thermal radiators, and power generation sufficient for extraction operations. Successfully extract ore from Minmus's surface.\n\nThis is Rubicon 12 of 12 - the final Project Rubicon validation. Your Minmus Orbital Station and Minmus Surfce Outpost can support crew accommodations during this operation. Success validates complete readiness for interplanetary exploration.\n\nProve you can refuel beyond Kerbin.
    
    //notes = ISRU Rover Deployment\nDeploy modified rover, or use EVA construction, in Minmus outpost area with:\n  • Drill module for ore extraction\n  • Ore storage tank\n  • Thermal cooling system (radiators)\n  • Adequate power generation for drilling\n  • Mobility for site selection\n\nDrilling Demonstration\nSuccessfully operate drill and extract ore, proving ISRU capability.
    
    synopsis = Deploy ISRU-equipped infrastructure to Minmus and successfully demonstrate resource extraction operations.
    
    completedMessage = ISRU capability validated.\n\nProject Rubicon complete. Stand by for Council evaluation.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 730
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Exceptional
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Mission 11 completion
    REQUIREMENT
    {
        name = CompleteMission11
        title = CompleteMission11
        type = CompleteContract
        contractType = PR_Mission11_MunResearchStation
    }
    
   
    REQUIREMENT
    {
        name = TechResearched
        type = Any
        title = Must have researched at least one tier 5 technology
        
        REQUIREMENT
        {
            name = AdvancedRocketry
            type = TechResearched
            tech = advRocketry
        }
        
        REQUIREMENT
        {
            name = HeavyRocketry
            type = TechResearched
            tech = heavyRocketry
        }
        
        REQUIREMENT
        {
            name = VeryHeavyRocketry
            type = TechResearched
            tech = veryHeavyRocketry
        }
        
        REQUIREMENT
        {
            name = AdvancedFuelSystems
            type = TechResearched
            tech = fuelSystems
        }
        
        REQUIREMENT
        {
            name = PrecisionPropulsion
            type = TechResearched
            tech = precisionPropulsion
        }
        
        REQUIREMENT
        {
            name = HighPerformanceFuelSystems
            type = TechResearched
            tech = highPerformanceFuelSystems
        }
        
        REQUIREMENT
        {
            name = NuclearPropulsion
            type = TechResearched
            tech = nuclearPropulsion
        }
        
        REQUIREMENT
        {
            name = IonPropulsion
            type = TechResearched
            tech = ionPropulsion
        }
        
        REQUIREMENT
        {
            name = LargeElectrics
            type = TechResearched
            tech = largeElectrics
        }
        
        REQUIREMENT
        {
            name = SpecializedElectrics
            type = TechResearched
            tech = specializedElectrics
        }
        
        REQUIREMENT
        {
            name = AdvSolarTech
            type = TechResearched
            tech = advSolarTech
        }
    }
    
    // Rewards - final mission, validates readiness for deep space
    advanceFunds = 30000.0
    rewardFunds = 200000.0
    rewardScience = 300.0
    rewardReputation = 75.0
    
    // Target Body
    targetBody = Minmus
    
    // Find flag vessels on Minmus
    DATA
    {
        type = List<Vessel>
	title = data1
        minmusVessels = AllVessels().Where(v => v.CelestialBody() == Minmus && v.VesselType() == Flag)
    }
    
    DATA
    {
        type = Vessel
	title = data2
        nearbyVessel = @/minmusVessels.First()
    }
    
    // Track mission completion for progression
    DATA
    {
        type = bool
	title = data3
        rubicon_mission12_complete = true
        persist = true
    }
    
//==========================================================================================
// 12.1 Validation Parameters - ISRU Rover Requirements
//==========================================================================================
    
    PARAMETER
    {
        name = ISRURoverDevelopment
        type = VesselParameterGroup
        title = Develop ISRU Platform
        
        define = ISRU Rover
                
        PARAMETER
        {
            name = HasDrill
            type = PartValidation
            partModule = ModuleResourceHarvester
            minCount = 1
            title = Must have drill module for ore extraction
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasOreStorage
            type = HasResourceCapacity
            resource = Ore
	    minQuantity = 10.0
            title = Must have ore storage capability
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasCooling
            type = PartValidation
            partModule = ModuleActiveRadiator
            minCount = 1
            title = Must have thermal cooling system (radiators)
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 2
            title = Must have adequate power generation (minimum 2 solar arrays)
            hideChildren = true
        }
    }
 
    PARAMETER
    {
        name = ISRURoverDeployment
        type = VesselParameterGroup
        title = Deploy ISRU gear at Minmus Outpost
        
        vessel = ISRU Rover
        
        notes = Deploy ISRU rover or use EVA construction near your Minmus Surface Outpost to demonstrate surface drilling operations capability.
        
        PARAMETER
        {
            name = NearStation
            type = Rendezvous
            vessel = @/nearbyVessel
            distance = 2500
            title = Deploy within 2.5km of Minmus infrastructure
        }
    }
//==========================================================================================
// 12.2 Objectives - Demonstrate Drilling Operations
//==========================================================================================
    
    PARAMETER
    {
        name = DrillingOperations
        type = VesselParameterGroup
        title = Demonstrate Resource Extraction
        
        // vessel = ISRU Rover
        
        PARAMETER
        {
            name = HasOre
            type = HasResource
            resource = Ore
            minQuantity = 0.1
            title = Extract and store ore samples
        }
    }

}
