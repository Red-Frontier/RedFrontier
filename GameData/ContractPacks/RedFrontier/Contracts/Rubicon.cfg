CONTRACT_TYPE
{
    name = PR_Mission7_PrecisionLanding
    title = Rubicon 7: "Precision Operations"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Surface Operations Division\nTO: Mission Control\nSUBJECT: Precision Landing and Infrastructure Integration Validation\n\nThe Mun Orbital Station is operational and ready to support surface missions. The Council now requires proof that orbital infrastructure can effectively support surface operations.\n\nDeep space missions will require precision landing at predetermined sites - returning to existing infrastructure, deploying additional modules, or investigating specific features. You must demonstrate targeted landing capability, not just "land anywhere."\n\nNavigate to your Mission 5 landing site using the flag as a visual reference. Deploy surface experiments, conduct EVA science operations, then return to the Mun Orbital Station. The station's Mobile Processing Lab will process your experimental data.\n\nThis mission validates precision navigation, surface deployable technology, and the complete orbital-surface-orbital operational cycle. Success proves you can integrate orbital and surface assets into a coherent operational system.
    
    notes = Mission Objectives:\n\nPrecision Landing\nNavigate to the flag planted during Mission 5 using visual navigation, demonstrating precision landing capability.\n\nSurface Deployable Experiments\nDeploy new tier 4 surface experiments at the landing site.\n\nEVA Science Operations\nConduct EVA science at the site using advanced equipment.\n\nStation Return\nReturn to Mun Orbital Station with collected data for research processing.
    
    synopsis = Navigate to Mission 5 landing site, deploy surface experiments, and return to Mun Orbital Station.
    
    completedMessage = Precision landing and integration validated.\n\nRubicon 8 is now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 365
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1
    
