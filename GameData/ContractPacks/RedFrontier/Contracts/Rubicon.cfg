//==========================================================================================
// 10.4 Waypoint Generation - 3 Survey Sites Near Landing Area
//==========================================================================================

    // Get all Minmus vessels 
    DATA
    {
        type = List<Vessel>
        title = MinmusVesselsData
        minmusVessels = AllVessels().Where(v => v.CelestialBody() == Minmus && v.VesselType() == Flag)
    }

    DATA
    {
