    {
        name = CompleteMission6
        title = CompleteMission6
        type = CompleteContract
        contractType = PR_Mission6_MunOrbitalStation
    }
    
    // Rewards - precision ops with new tech
    advanceFunds = 20000.0
    rewardFunds = 100000.0
    rewardScience = 90.0
    rewardReputation = 25.0
    
    // Target Body
    targetBody = Mun
    
    // Find the flag vessel - get all Mun vessels, take first one (should be the flag from Mission 5)
    DATA
    {
