//==========================================================================================
// 8.3 Waypoint Generation - 3 Survey Sites Near Landing Area
//==========================================================================================
    // Get all Mun vessels 
    DATA
    {
        type = List<Vessel>
	title = data1
        //hidden = false
        munVessels = AllVessels().Where(v => v.CelestialBody() == Mun && v.VesselType() == Flag)
