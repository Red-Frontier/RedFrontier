//==========================================================================================
// PROJECT RUBICON - PHASE 0: LOCAL MOON CAMPAIGN
// Mission 1: First Orbit
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Mission1_StableOrbit
    title = Rubicon 1: "First Steps"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Flight Operations\nTO: Mission Control\nSUBJECT: Project Rubicon - Orbital Operations Initiative\n\nCongratulations on reaching space! Your suborbital flight demonstrated basic launch capability, but the Science Council requires proof of sustained orbital operations before authorizing advanced missions.\n\nThe Council has established Project Rubicon: a comprehensive validation program to prove operational capability throughout the Kerbin system. Each mission will demonstrate specific skills essential for deep space exploration. Success in Rubicon qualifies us for operations beyond Kerbin's sphere of influence.\n\nYour first objective: achieve stable orbit and execute controlled return. This fundamental capability serves as the foundation for everything that follows. Demonstrate you can reach orbit, maintain stable trajectory, and bring your crew home safely.
    
    
    notes = Mission Objectives:\n\nOrbital Insertion and Return\nAchieve stable orbit around Kerbin at any altitude, demonstrating basic orbital mechanics and trajectory control.\n\n
    
    synopsis = Achieve stable orbit around Kerbin and return safely to the surface.
    
    completedMessage = Orbital capability validated.\n\nRubicon 2 is now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 180
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after reaching space
    REQUIREMENT
    {
        name = ReachSpace
        type = ReachSpace
    }
    
    // Rewards - early campaign, modest rewards
    advanceFunds = 5000.0
    rewardFunds = 75000.0
    rewardScience = 45.0
    rewardReputation = 10.0
    
    // Target Body
    targetBody = Kerbin
    
    // Track mission completion for progression
    DATA
    {
        type = bool
        rubicon_mission1_complete = true
        persist = true
    }
    
//==========================================================================================
// 1.1 PARAMETERS
//==========================================================================================
    
    PARAMETER
    {
        name = OrbitAndReturn
        type = VesselParameterGroup
        title = Achieve Stable Orbit and Return
	notes = Use Maneuver mode to monitor your APOAPSIS until it is above 70km. then when you reach space burn parallel to the horizon until your PERIAPSIS is in space.\n\n
        define = Rubicon 1
        PARAMETER
        {
            name = ReachOrbit
            type = Orbit
            targetBody = Kerbin
            minPeA = 70000
	    disableOnStateChange = true
            
            PARAMETER
            {
                name = Duration
                type = Duration
                duration = 30s
                preWaitText = Achieve stable orbit
                waitingText = Maintaining orbit
                completionText = Orbit achieved!
            }
        }
        
        PARAMETER
        {
            name = ReturnHome
            type = ReturnHome
            title = Return safely to Kerbin surface
	    notes = Execute safe re-entry and landing, proving you can return crew and equipment safely from orbit.\nBe sure to leave enough fuel to deorbit!
        }
    }
}


//==========================================================================================
//==========================================================================================
// PROJECT RUBICON - PHASE 0: LOCAL MOON CAMPAIGN
// Mission 2: Deep Orbit
//==========================================================================================
//==========================================================================================


CONTRACT_TYPE
{
    name = PR_Mission2_SatelliteDeployment
    title = Rubicon 2: "Beyond the Horizon"
    
description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Advanced Systems Division\nTO: Mission Control\nSUBJECT: High-Energy Orbit and Autonomous Systems Validation\n\nYour successful orbital flight demonstrated basic spaceflight capability. The Council has validated orbital operations and cleared you for the next requirement.\n\nDeep space missions require autonomous spacecraft capable of operating for extended periods without crew intervention. Before we commit to crewed missions beyond Kerbin orbit, the Council requires proof that you can design and deploy functional satellite systems.\n\nDeploy a satellite to high-energy orbit reaching beyond the Mun's orbital altitude. The satellite must demonstrate autonomous power generation, communications capability, and stable long-duration operations. This validates the technology foundation for future relay networks and deep space probe missions.
    
    notes = Mission Objectives:\n\nSatellite must operate autonomously with power generation and communications systems.\n
    
    synopsis = Deploy a satellite to high-energy orbit beyond the Mun's orbital altitude, demonstrating autonomous systems capability.
    
    completedMessage = Autonomous systems validated.\n\nRubicon 3 is now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 365
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Mission 1 completion
    REQUIREMENT
    {
        name = CompleteMission1
	title = CompleteMission1
        type = CompleteContract
        contractType = PR_Mission1_StableOrbit
    }
    
    // Rewards - slightly higher for more complex mission
    advanceFunds = 10000.0
    rewardFunds = 95000.0
    rewardScience = 55.0
    rewardReputation = 10.0
    
    // Target Body
    targetBody = Kerbin
    
    // Unlock RA-2 Relay Antenna for this mission
    BEHAVIOUR
    {
        name = UnlockRA2Relay
        type = ExperimentalPart
        part = RelayAntenna5
        unlockCriteria = CONTRACT_ACCEPTANCE
    }
    BEHAVIOUR
    {
        name = UnlockSmallPanel
        type = ExperimentalPart
        part = solarPanels5
        unlockCriteria = CONTRACT_ACCEPTANCE
    }
    // Track mission completion for progression
    DATA
    {
        type = bool
        rubicon_mission2_complete = true
        persist = true
    }
    
//==========================================================================================
// 2.1 Validation Parameters
//==========================================================================================
    
    PARAMETER
    {
        name = SatelliteDevelopment
        type = VesselParameterGroup
        title = Deploy Functional Satellite
        

        
        PARAMETER
        {
            name = HasRA2Relay
            type = PartValidation
            part = RelayAntenna5
            minCount = 1
            title = Must have RA-2 Relay Antenna (provided as experimental part)
	    hideChildren = true
        }
        
        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Must have power generation (solar panels)
	    hideChildren = true
        }

        PARAMETER
	{
	    name = HasExperiment
	    type = PartValidation
	    partModule = ModuleScienceExperiment
	    minCount = 1
	    title = Must have at least one science experiment
	    hideChildren = true
	}

        PARAMETER
        {
            name = Crewless
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Must be uncrewed (autonomous operations)
	    hideChildren = true
        }
    }
    
//==========================================================================================
// 2.2 Objectives - Deploy to high orbit and maintain operations
//==========================================================================================
    
    PARAMETER
    {
        name = HighOrbitDeployment
        type = VesselParameterGroup
        title = Deploy to High Energy Orbit
	notes = Deploy satellite beyond the Mun \n(Minimum periapsis 14,000,000m)\nDemonstrating high delta-V mission capability.

        define = Rubicon Satellite 1
        
        PARAMETER
        {
            name = ReachHighOrbit
            type = Orbit
            targetBody = Kerbin
            minPeA = 14000000
            title = Reach an orbital altitude beyond the Mun (14,000 km)
	    hideChildren = true
	}
        PARAMETER
        {
            name = Duration
            type = Duration
            duration = 30s
            preWaitText = Circularize above 14,000,000m
            waitingText = Confirming telemetry...
            completionText = Orbit achieved!
	    hideChildren = true
        }
    }

    PARAMETER
    {
	name = TransmitScience
	type = CollectScience
	targetBody = Kerbin
	situation = InSpaceHigh
	recoveryMethod = Transmit
	title = Transmit scientific data 
	hideChildren = true
	notes = Relay networks extend data transmission capability that will be essential for future missions.
		
    } 
}


//==========================================================================================
//==========================================================================================
// PROJECT RUBICON - PHASE 0: LOCAL MOON CAMPAIGN
// Mission 3: Mun Flyby & Return
//==========================================================================================
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Mission3_MunFlyby
    title = Rubicon 3: "Reaching Beyond"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Science Division\nTO: Mission Control\nSUBJECT: Mun Scientific Survey Mission - Crewed Operations Authorization\n\nYour satellite deployment validated autonomous high-energy operations. The Council has cleared you for crewed missions beyond Kerbin orbit.\n\nBefore authorizing surface operations, the Council requires comprehensive scientific data from the Mun environment. This mission will be our first crewed journey to another celestial body - a critical step toward proving interplanetary capability.\n\nReach Mun's sphere of influence and conduct scientific surveys in both high and low orbit. Gather crew reports, EVA observations, and experimental data from multiple orbital zones. Return all crew and data safely to Kerbin.\n\nThis mission validates interplanetary transfer planning and deep space crew operations. It also establishes baseline scientific data for future Mun missions.
    
    notes = Mission Objectives:\n\nExecute transfer to Mun and enter its sphere of influence, demonstrating interplanetary-style trajectory planning.\n\nConduct comprehensive scientific observations in two distinct orbital zones: in space High and Low above the Mun\nCollect Crew Reports, EVA Reports, and run all science experiments in both zones\n\nSafe Return\nReturn all crew and scientific data safely to Kerbin surface. 
    
    synopsis = Reach Mun's sphere of influence, conduct scientific surveys in high and low orbit, and return safely to Kerbin.
    
    completedMessage = Interplanetary transfer validated.\n\nRubicon 4 is now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 365
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Mission 2 completion
    REQUIREMENT
    {
        name = CompleteMission
	title = CompleteMission
        type = CompleteContract
        contractType = PR_Mission2_SatelliteDeployment
    }
    
    // Rewards - significant mission, good science return
    advanceFunds = 45000.0
    rewardFunds = 105000.0
    rewardScience = 90.0
    rewardReputation = 20.0
    
    // Target Body
    targetBody = Mun

    BEHAVIOUR
    {
        name = UnlockRA2Relay
        type = UnlockPart
        part = RelayAntenna5
	unlockTech = true
    }    

    // Track mission completion for progression
    DATA
    {
        type = bool
        rubicon_mission3_complete = true
        persist = true
    }
    
//==========================================================================================
// 3.1 Validation Parameters - Vessel Requirements
//==========================================================================================
    
    PARAMETER
    {
        name = MunVesselRequirements
        type = VesselParameterGroup
        title = Mun Survey Vessel Requirements
        
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            minCrew = 1
            title = Must have at least 1 crew member
	    hideChildren = true
        }
        
        PARAMETER
        {
            name = HasGoo
            type = PartValidation
            part = GooExperiment
            title = Must have 2 Mystery Goo experiments
	    minCount = 2
	    hideChildren = true
	}
        
        PARAMETER
        {
            name = HasThermometer
            type = PartValidation
            part = sensorThermometer
            title = Must have Thermometer
	    minCount = 1
	    hideChildren = true
	}
    }
    
//==========================================================================================
// 3.2 Objectives - High Orbit Science Survey
//==========================================================================================
    
    PARAMETER
    {
        name = HighOrbitSurvey
        type = VesselParameterGroup
        title = High Orbit Science Survey
	rewardScience = 10.0
	rewardReputation = 1.0

        
        PARAMETER
        {
	    name = ReachHighOrbit
	    type = ReachState
	    targetBody = Mun
	    situation = ESCAPING
	    minAltitude = 60000
            title = Reach high Mun orbit (above 60km)
	    hideChildren = true
        }
        
        PARAMETER
        {
            name = HighOrbitCrewReport
            type = CollectScience
            targetBody = Mun
            situation = InSpaceHigh
            experiment = crewReport
            title = Crew Report from High Above Mun
	    hideChildren = true
        }
        
        PARAMETER
        {
            name = HighOrbitEVA
            type = CollectScience
            targetBody = Mun
            situation = InSpaceHigh
            experiment = evaReport
            title = EVA Report from High Above Mun
	    hideChildren = true
        }

        PARAMETER
        {
            name = Duration
            type = Duration
            duration = 2s
	    completeInSequence = true
	    hidden = true
        }
    }
    
//==========================================================================================
// 3.3 Objectives - Low Orbit Science Survey
//==========================================================================================
    
    PARAMETER
    {
        name = LowOrbitSurvey
        type = VesselParameterGroup
        title = Low Orbit Science Survey
	rewardScience = 10.0
	rewardReputation = 1.0
            
        PARAMETER
        {
	    name = ReachLowOrbit
	    type = ReachState
	    targetBody = Mun
	    situation = ESCAPING
	    maxAltitude = 60000
            title = Move into low Mun orbit (below 60km)
	    hideChildren = true
        }
    
        
        PARAMETER
        {
            name = LowOrbitCrewReport
            type = CollectScience
            targetBody = Mun
            situation = InSpaceLow
            experiment = crewReport
            title = Crew Report from Space Near Mun
	    hideChildren = true
        }
        
        PARAMETER
        {
            name = LowOrbitEVA
            type = CollectScience
            targetBody = Mun
            situation = InSpaceLow
            experiment = evaReport
            title = EVA Report from Space Near Mun
	    hideChildren = true
        }
        PARAMETER
        {
            name = Duration
            type = Duration
            duration = 2s
	    completeInSequence = true
	    hidden = true
        }
    }
    
//==========================================================================================
// 3.4 Objectives - Safe Return
//==========================================================================================
    
    PARAMETER
    {
        name = SafeReturn
        type = VesselParameterGroup
        title = Return Crew and Data Safely to Kerbin
	//hideChildren = true
	//completeInSequence = true
	
	notes = Your orbital velocity will be very high upon re-entry. Aim for 45Km-60Km Periapsis to make an aerobraking pass. 

	PARAMETER
        {
	    name = ReachSubOrbit
	    type = Orbit
	    targetBody = Kerbin
	    maxPeA = 60000
            title = Lower your Kerbin Periapsis to below 60Km to return home.
	    situation = SUB_ORBITAL
	    disableOnStateChange = true
	    hideChildren = true
	    
	    PARAMETER
            {
                name = Duration
                type = Duration
                duration = 2s
	        completeInSequence = true
	       hidden = true
            }
        }
	    
        PARAMETER
        {
            name = ReturnHome
            type = ReachState
            title = Return to Kerbin surface
	    targetBody = Kerbin
	    situation = LANDED
	    situation = SPLASHED
	    hideChildren = true
        }
    }
}

//==========================================================================================
// PROJECT RUBICON - PHASE 0: LOCAL MOON CAMPAIGN
// Mission 4: Orbital Rendezvous
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Mission4_DockingValidation
    title = Rubicon 4: "Orbital Bridge"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Advanced Flight Operations\nTO: Mission Control\nSUBJECT: Rendezvous and Docking Capability Validation\n\nYour Mun flyby validated interplanetary transfer capability and deep space crew operations. The Council has completed analysis of your trajectory planning and cleared you for advanced coordination operations.\n\nEvery complex space operation depends on one fundamental skill: orbital rendezvous and docking. Station construction, crew transfer, multi-vehicle missions, and modular spacecraft assembly all require precision docking capability. The Council will not authorize permanent infrastructure deployment without proof of this skill.\n\nDeploy a target vehicle to Kerbin orbit, then launch a crewed capsule to rendezvous and dock with it. After successful docking, separate and return the crew safely to Kerbin surface.\n\nThis mission validates the precision spaceflight capability required for everything that follows. Master docking, and we can build permanent infrastructure throughout the system.
    
    // notes = Mission Objectives:\n\nTarget Deployment\nDeploy uncrewed target vehicle with docking port to high Kerbin orbit.\n\nCrewed Rendezvous\nLaunch crewed capsule, execute orbital rendezvous, and achieve successful docking with target.\n\nSafe Return\nUndock and return crew safely to Kerbin surface, proving the complete docking cycle.
    
    synopsis = Deploy a target vehicle to orbit, then launch a crewed capsule to rendezvous and dock. Return crew safely after docking.
    
    completedMessage = Docking capability validated.\n\nRubicon 5 is now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 365
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Mission 3 completion
    REQUIREMENT
    {
        name = CompleteMission3
        title = CompleteMission3
        type = CompleteContract
        contractType = PR_Mission3_MunFlyby
    }
    
    // Rewards - teaching critical capability
    advanceFunds = 12000.0
    rewardFunds = 75000.0
    rewardScience = 90.0
    rewardReputation = 10.0
    
    // Target Body
    targetBody = Kerbin
    
    // Track mission completion for progression
    DATA
    {
        type = bool
        rubicon_mission4_complete = true
        persist = true
    }
    
//==========================================================================================
// 4.1 Validation Parameters - Target Vehicle Requirements
//==========================================================================================
    
    PARAMETER
    {
        name = TargetDeployment
        type = VesselParameterGroup
        title = Deploy Autonomous Target Vehicle
	notes = Deploy an uncrewed target vehicle with docking port to high Kerbin orbit.
        
        define = Target
        
        PARAMETER
        {
            name = TargetCrewless
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Target must be uncrewed
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasDockingPort
            type = PartValidation
            partModule = ModuleDockingNode
            minCount = 1
            title = Must have docking port
            hideChildren = true
        }
        
        PARAMETER
        {
            name = TargetOrbit
            type = Orbit
            targetBody = Kerbin
            minAltitude = 150000
            maxAltitude = 500000
            title = Achieve high Kerbin orbit (150-500km)
            hideChildren = true
        }
    }
    
//==========================================================================================
// 4.2 Objectives - Crewed Rendezvous and Docking
//==========================================================================================
    
    PARAMETER
    {
        name = CrewedDocking
        type = VesselParameterGroup
        title = Launch Crewed Capsule
        notes = Launch a chaser capsule into high orbit, and execute a rendezvous and docking with target vehicle.

        define = Chaser
        
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            minCrew = 1
            title = Must have at least 1 crew member
            hideChildren = true
	    disableOnStateChange = true
        }
        
        PARAMETER
        {
            name = HasCrewDockingPort
            type = PartValidation
            partModule = ModuleDockingNode
            minCount = 1
	    disableOnStateChange = true
            title = Must have docking port
            hideChildren = true
        }
        
        PARAMETER
        {
            name = RendezvousOrbit
            type = Orbit
            targetBody = Kerbin
            minAltitude = 150000
            maxAltitude = 500000
            title = Reach target orbit altitude
	    disableOnStateChange = true
            //hideChildren = true
        }
        
        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            vessel = Target
            distance = 100
            title = Achieve rendezvous within 100m of target
	    disableOnStateChange = true
        }
        
        PARAMETER
        {
            name = Docking
            type = Docking
            vessel = Target
            title = Dock with target vehicle
        }
    }
    
//==========================================================================================
// 4.3 Objectives - Safe Return
//==========================================================================================
    
    PARAMETER
    {
        name = SafeReturn
        type = All
        title = Return Crew Safely to Kerbin
        notes = Undock and deorbit the capsule safely to Kerbin's surface, proving the complete docking cycle.
	completeInSequence = true
	//vessel = Chaser

        PARAMETER
        {
            name = ReturnHome
            type = ReturnHome
            title = Return crew to Kerbin surface
	    
        }
    }
}

//==========================================================================================
// PROJECT RUBICON - PHASE 0: LOCAL MOON CAMPAIGN
// Mission 5: Mun Landing & Return
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Mission5_MunLanding
