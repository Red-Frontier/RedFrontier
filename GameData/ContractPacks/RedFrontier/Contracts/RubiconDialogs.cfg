            {
                name = Instructor_Gene
                animation = idle_wonder
            }
            
            TEXT
            {
                text = Leaving Kerbin's sphere of influence changes everything. You're navigating between gravitational fields now. Capture into Mun orbit, conduct your surveys, then calculate the return trajectory that brings you home - not into solar orbit.\n\nMultiple orbital zones. Transfer windows. Crew life support over days, not hours. One miscalculation and your crew doesn't come back.\n\nRubicon 3 is available. This is the proving ground for interplanetary operations. Get your crew to the Mun and bring them home.
                fontSize = 18
            }
        }
    }
}

