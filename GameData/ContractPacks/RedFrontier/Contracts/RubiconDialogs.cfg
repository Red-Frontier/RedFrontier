//==========================================================================================
// PROJECT RUBICON - NARRATIVE DIALOG CONTRACTS
// These contracts provide narrative transitions between Rubicon missions
// Total: 1 Preamble + 12 Transition Dialogs = 52 dialog boxes
//==========================================================================================

//==========================================================================================
// PREAMBLE - Triggers on first vessel prelaunch
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Rubicon_Preamble
    title = Qualify For Project Rubicon
    
    description = The Science Council has authorized Project Rubicon.
    synopsis = The Science Council has authorized Project Rubicon.
    completedMessage = Welcome to the program.
    
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    minExpiry = 0
    maxExpiry = 0
    deadline = 1
    cancellable = false
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    advanceFunds = 0
    rewardFunds = 0
    rewardScience = 0
    rewardReputation = 0
    
    targetBody = Kerbin

    PARAMETER
    {
	name = FirstFlight
	type = HasAstronaut
	minCount = 1
    }
	
    PARAMETER
    {
        name = ReachSpace
        type = ReachSpace
    }

    PARAMETER
    {
        name = AutoComplete
        type = Duration
        duration = 3s
        preWaitText = ""
        waitingText = ""
        completionText = ""
    }

    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = ReachSpace
            position = CENTER
            title = Red Frontier Authorization
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = idle_wonder
            }
            
            TEXT
            {
                text = Welcome to Red Frontier.\n\nYou've reached space. That qualifies you for the program.\n\nRed Frontier is our designation for deep space operations beyond Kerbin's sphere of influence. Multiple campaigns. Sustained infrastructure. Permanent off-world capability.\n\nProject Rubicon is where it starts. Twelve missions that validate essential capabilities. Prove you're ready for what comes next.\nThe Science Council oversees authorization. They require proof before clearing expanded operations. Rubicon provides that proof.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = ReachSpace
            position = CENTER
            title = Beyond the Rubicon
            titleColor = #2196F3
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_smileA
            }
            
            TEXT
            {
                text = Project Rubicon validates everything deep space demands.\n\nOrbital mechanics. Rendezvous and docking. Precision navigation. Surface operations. Infrastructure deployment. Long-duration missions. Resource extraction. Environmental adaptability.\n\nEach mission proves a specific capability. Each success unlocks the next requirement. No shortcuts. No repetition of proven skills - once you demonstrate competence, we trust it.\n\nComplete all twelve validations, and the Council clears you for interplanetary operations.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = ReachSpace
            position = CENTER
            title = Beyond the Rubicon
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_smileA
            }
            
            TEXT
            {
                text = Your first mission is Rubicon 1 \nReach orbit around Kerbin. Achieve stable trajectory - at least 75km periapsis and apoapsis. Maintain that orbit for a full rotation. Return safely.\n\nThis proves you understand orbital mechanics and can execute sustained operations in space. Foundation for everything that follows.\n\nRubicon 1 is available. Get to orbit. Stay there. Come home.
                fontSize = 18
            }
        }
    }
}

//==========================================================================================
// MISSION 1 → 2 TRANSITION
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Mission1_Dialog
    title = Mission Update
    
    description = Status update from Mission Control.
    synopsis = Status update from Mission Control.
    completedMessage = Message acknowledged.
    
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    minExpiry = 0
    maxExpiry = 0
    deadline = 1
    cancellable = false
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    advanceFunds = 0
    rewardFunds = 0
    rewardScience = 0
    rewardReputation = 0
    
    targetBody = Kerbin
    
    REQUIREMENT
    {
        name = Mission1Complete
        type = CompleteContract
        contractType = PR_Mission1_StableOrbit
    }
    
    PARAMETER
    {
        name = AutoComplete
        type = Duration
        duration = 1s
        preWaitText = ""
        waitingText = ""
        completionText = ""
    }
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #4CAF50
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_thumbsUp
            }
            
            TEXT
            {
                text = You've proven orbital capability! \n\nYou can reach space, maintain trajectory, and return safely. Now the Council needs to see autonomous systems deployment.\n\nDeep space requires satellites that operate without human intervention, with on board power generation and communications for long-duration operations.That leads to reaching other bodies, then coordination between vessels, then surface operations.\nThe progression is deliberate. Each skill becomes foundation for what follows.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #2196F3
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_wonder
            }
            
            TEXT
            {
                text = Orbit proved, now autonomous systems.\n\nRubicon 2 will prove you can maintain autonomous operations and achieve the high energy orbits required to land on distant bodies. Send something beyond the Mun that can operate independently.\n\nProve your satellites work without constant supervision, and the Mun will be yours in no time!
                fontSize = 18
            }
        }
    }
}

