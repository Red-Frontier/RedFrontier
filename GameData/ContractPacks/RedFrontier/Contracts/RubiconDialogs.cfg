            position = CENTER
            title = Rubicon Mission Control
            titleColor = #4CAF50
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_thumbsUp
            }
            
            TEXT
            {
                text = Rover operations confirmed. Mobile surface science capability proven.\n\nThe Council has validated every individual skill required for deep space operations. Now the approach changes.\n\nWernher wants to explain.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = idle_wonder
            }
            
            TEXT
            {
                text = The Mun missions were training. Crawl, walk, run. Each capability validated individually because proximity allowed iteration.\n\nDeep space doesn't offer that luxury. Transfer windows measured in years. Distance that makes every launch critical. You bring everything you need, or you fail.\n\nThis was always the plan.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_smileA
            }
            
            TEXT
            {
                text = Rubicon 9 presents both objectives simultaneously:\n\nDeploy Minmus orbital infrastructure AND execute surface operations. One expedition. Two phases. Your planning determines execution.\n\nLaunch it together. Assemble in orbit. Stage sequentially. Whatever works - the Council evaluates mission architecture, not launch vehicles.\n\nProve you can plan complete expeditions, not just individual missions.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_smileA
            }
            
            TEXT
            {
                text = What required multiple Mun missions, you'll accomplish as one Minmus expedition.\n\nThis validates integrated mission architecture - the planning and execution efficiency that deep space demands.\n\nCrawl, walk, run. You've reached the edge of the porch. Deep space is the end of the road.\n\nRubicon 9 is available.
                fontSize = 18
            }
        }
    }
}

