//==========================================================================================
// MISSION 4 → 5 TRANSITION (Wernher Milestone)
//==========================================================================================

CONTRACT_TYPE
{
    name = PR_Mission4_Dialog
    title = Mission Update
    
    description = Status update from Mission Control.
    synopsis = Status update from Mission Control.
    completedMessage = Message acknowledged.
    
    agent = Kerbal Initiatives Division
    group = ProjectRubicon
    
    minExpiry = 0
    maxExpiry = 0
    deadline = 1
    cancellable = false
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    advanceFunds = 0
    rewardFunds = 0
    rewardScience = 0
    rewardReputation = 0
    
    targetBody = Kerbin
    
    REQUIREMENT
    {
        name = Mission4Complete
        type = CompleteContract
        contractType = PR_Mission4_DockingValidation
    }
    
    PARAMETER
    {
        name = AutoComplete
        type = Duration
        duration = 1s
        preWaitText = ""
        waitingText = ""
        completionText = ""
    }
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #4CAF50
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_thumbsUp
            }
            
            TEXT
            {
                text = By the stars, you actually did it. Rendezvous and docking - successful.\n\nYou coordinated two spacecraft traveling at orbital velocities, closed a multi-kilometer gap to within centimeters. Like hitting a bullet with a smaller bullet while riding a horse.\n\nThe Council has completed analysis. All prerequisites for surface operations are met.\n\nWernher wants a word.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = idle_wonder
            }
            
            TEXT
            {
                text = Everything you've proven - trajectory planning, orbital mechanics, precision operations, crew safety - comes together here. Powered descent. Touchdown on alien terrain. Return from another world.\n\nThe first kerbal to walk on the Mun will be remembered forever. But that's not why we're doing this.\n\nWe're proving we can land on distant worlds and return safely. That's what matters.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Rubicon Mission Control
            titleColor = #FF9800
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_smileA
            }
            
            TEXT
            {
                text = Rubicon 5: Land on the Mun.\n\nPowered descent to the surface. Plant a flag at the landing site. Conduct surface science. Return your crew to Kerbin safely.\n\nThe Council requires proof of surface capability before authorizing interplanetary landing missions. This is that proof.\n\nRubicon 5 is available. Make it count.
                fontSize = 18
            }
        }
    }
}

