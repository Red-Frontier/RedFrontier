            {
                text = Satellite deployed and operational. Autonomous power, communications, and high-energy orbit validated.\n\nThe Council has cleared you for crewed operations beyond Kerbin orbit. Rubicon 3 targets the Mun - first journey to another celestial body.\n\nThis is where it gets serious.
                fontSize = 18
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
