// Red Frontier v3 - Stock Contract Limiter
// Limits stock contract generation to maintain focus on Red Frontier missions
// Place this file in: GameData/ContractPacks/RedFrontier/
// Requires Module Manager

// Reduce the total number of available contracts shown at once
@Contracts
{
    @AverageAvailableContracts = 3  // Reduced from default 10
}

// Limit the total number of active contracts allowed
@Contracts
{
    @ContractLimit = 5  // Total active contracts at once (includes Red Frontier contracts)
}

// Limit individual contract type offerings
// Survey contracts - limit to 1 at a time
@Contracts:HAS[#type[SurveyContract]]
{
    @maxSimultaneous = 1
}

// Progression contracts (milestone contracts) are handled by stock game
// They typically only appear 1-2 at a time based on achievements
// No additional limiting needed

// Optional: Further reduce contract spam by limiting how many contracts
// of any type can be offered at once
@Contracts
{
    @MaximumAvailable = 3  // Maximum number of any single type available
}

