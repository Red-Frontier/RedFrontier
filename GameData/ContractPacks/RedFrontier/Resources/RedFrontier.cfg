// Contract Pack configuration file
CONTRACT_GROUP
{
    name = RedFrontier
    displayName = Red Frontier Program
    minVersion = 1.30.0
    
    // Group details
    agent = Kerbal Initiatives Division
    maxSimultaneous = 5
    
    // Disable most stock contract types for v3, keeping only Progression and Survey
    // World-First Records
    disabledContractType = RecordsAltitude
    disabledContractType = RecordsSpeed
    disabledContractType = RecordsDistance
    
    // Exploration contracts (except Survey which we keep)
    disabledContractType = ExploreBody
    disabledContractType = PlantFlag
    
    // Part Tests
    //disabledContractType = PartTest
    
    // Station contracts
    disabledContractType = BaseContract
    disabledContractType = StationContract
    
    // Satellite contracts
    disabledContractType = SatelliteContract
    
    // Tourism
    disabledContractType = TourismContract
    
    // Grand Tours
    disabledContractType = GrandTour
    
    // Rescue missions
    disabledContractType = RescueKerbal
    
    // Resource contracts
    disabledContractType = ResourceContract
    
    // ARM (Asteroid Redirect Mission)
    disabledContractType = ARMContract
    
    // Note: Progression contracts (orbital/landing milestones) and Survey contracts remain enabled
}

