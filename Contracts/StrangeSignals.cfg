//==========================================================================================
// STRANGE SIGNALS SEQUENCE - BRIDGE TO PATHFINDER
// Side-quest gatekeeper: Rubicon → Pathfinder
// Tone: Curiosity-driven investigation, not crisis-driven
// Characters: Gene + Science Guy only (no Wernher - not a milestone)
// Total: 2 missions, 5 dialog boxes
//==========================================================================================

//==========================================================================================
// MISSION 1: "DETECTION"
// Trigger: After Rubicon 10 complete (can run concurrent with R11-12)
//==========================================================================================

CONTRACT_TYPE
{
    name = SS1_Detection
    title = Strange Signals I: "Detection"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Deep Space Monitoring Division\nTO: Mission Control\nSUBJECT: Sensor Network Anomaly Investigation\n\nKerbin system sensor network operational. Your deployed infrastructure across Mun and Minmus provides comprehensive monitoring capability throughout the local system.\n\nRoutine background monitoring has detected faint electromagnetic patterns originating from beyond Kerbin's sphere of influence. Signal characteristics show structure inconsistent with natural stellar radiation. The patterns appear intermittent but repeatable.\n\nBefore committing resources to investigation programs, the Council requires confirmation and characterization. Deploy a magnetometer-equipped probe to high Kerbin orbit beyond Mun's altitude to minimize local interference. Validate sensor readings and establish baseline data.\n\nThis is straightforward sensor validation. Confirm the readings, characterize the patterns, transmit the data.
    
    notes = Mission Objectives:\n\nDeploy magnetometer probe to high Kerbin orbit (beyond Mun's orbital altitude).\nValidate sensor readings and transmit data.\n
    
    synopsis = Deploy a magnetometer-equipped probe to high Kerbin orbit to validate electromagnetic readings detected by your infrastructure network.
    
    completedMessage = Magnetometer probe deployed and data transmitted successfully.\n\nStand by for analysis results.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = RedFrontier
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 365
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Rubicon 10 completion
    REQUIREMENT
    {
        name = CompleteRubicon10
        title = Complete Rubicon 10
        type = CompleteContract
        contractType = PR_Mission10_MinmusSurfaceBase
    }
    
    // Requires magnetometer technology available
    REQUIREMENT
    {
        name = CanResearchMagnetometer
        type = CanResearchTech
        part = Magnetometer
    }
    
    // Rewards - side quest, moderate rewards
    advanceFunds = 15000.0
    rewardFunds = 100000.0
    rewardScience = 50.0
    rewardReputation = 10.0
    
    // Target Body
    targetBody = Kerbin
    
    // Track mission completion for progression
    DATA
    {
        type = bool
        strange_signals_1_complete = true
        persist = true
    }
    
//==========================================================================================
// SS1 PARAMETERS - Magnetometer Probe Development
//==========================================================================================
    
    PARAMETER
    {
        name = MagnetometerProbeDevelopment
        type = VesselParameterGroup
        title = Develop Magnetometer Probe
        
        define = Magnetometer Validation Probe
        
        PARAMETER
        {
            name = HasMagnetometer
            type = PartValidation
            part = Magnetometer
            minCount = 1
            title = Must have Magnetometer sensor
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasAntenna
            type = PartValidation
            partModule = ModuleDataTransmitter
            minCount = 1
            title = Must have communications capability
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Must have power generation (solar panels)
            hideChildren = true
        }
        
        PARAMETER
        {
            name = Crewless
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Must be uncrewed (autonomous operations)
            hideChildren = true
        }
    }
    
//==========================================================================================
// SS1 OBJECTIVES - High Orbit Deployment and Validation
//==========================================================================================
    
    PARAMETER
    {
        name = HighOrbitDeployment
        type = VesselParameterGroup
        title = Deploy to High Kerbin Orbit
        notes = Deploy probe beyond Mun's orbital altitude to minimize local interference and validate sensor readings.
        
        vessel = Magnetometer Validation Probe
        
        PARAMETER
        {
            name = ReachHighOrbit
            type = Orbit
            targetBody = Kerbin
            minPeA = 13600000  // Beyond Mun's orbit (~12,000km)
            disableOnStateChange = false
        }
        
        PARAMETER
        {
            name = ValidationDuration
            type = Duration
            duration = 3d
            preWaitText = Achieve high orbit
            waitingText = Collecting baseline sensor data
            completionText = Validation period complete
	    disableOnStateChange = false
        }
    }
    
    PARAMETER
    {
        name = TransmitMagnetometerData
        type = VesselParameterGroup
        title = Transmit Magnetometer Data
        notes = Transmit magnetometer readings to characterize electromagnetic patterns.
        
        vessel = Magnetometer Validation Probe
        
        PARAMETER
        {
            name = CollectMagnetometerData
            type = CollectScience
            experiment = magnetometer
            targetBody = Kerbin
            recoveryMethod = Transmit
            title = Transmit magnetometer data from high orbit
        }
    }
    
//==========================================================================================
// SS1 COMPLETION DIALOG - Inline (2 boxes)
//==========================================================================================
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = TransmitMagnetometerData
            position = CENTER
            title = Readings Confirmed
            titleColor = #4CAF50
            width = 0.6
            
            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = true_thumbsUp
            }
            
            TEXT
            {
                text = Magnetometer data received and analyzed. The patterns are real.\n\nStructured electromagnetic signatures confirmed. Source appears to be well beyond Kerbin's sphere of influence. Preliminary triangulation suggests Duna system direction.\n\nThis warrants investigation.
                fontSize = 20
            }
        }
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = HighOrbitDeployment
            position = CENTER
            title = Interplanetary Survey Authorization
            titleColor = #2196F3
            width = 0.6
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_smileA
            }
            
            TEXT
            {
                text = The Council has authorized a deep space probe mission. Duna system flyby. Magnetometer plus surface scanner. Confirm source location and gather survey data.\n\nThis is a sounding mission. Deploy a probe to the Duna system, characterize what we're seeing, and bring the data home. Low risk, high value.
                fontSize = 20
            }
        }
    }
}

//==========================================================================================
// MISSION 2: "INVESTIGATION"
// Trigger: After SS1 complete
//==========================================================================================

CONTRACT_TYPE
{
    name = SS2_Investigation
    title = Strange Signals II: "Investigation"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Deep Space Survey Division\nTO: Mission Control\nSUBJECT: Duna System Electromagnetic Survey Mission\n\nMagnetometer validation confirmed structured electromagnetic patterns from Duna system direction. The Council has authorized interplanetary probe deployment to characterize the source.\n\nThis mission deploys a magnetometer-equipped probe to Duna system. Reach Duna's orbital altitude, collect electromagnetic readings, transmit findings. Simple flyby operation to confirm the source direction and characterize signal strength at proximity.\n\nYour Rubicon operations validated all required skills for this mission. Interplanetary transfer planning. Autonomous probe operations. Long-duration mission management. This is application of proven capability, not new validation.\n\nDeploy the probe. Fly past Duna. Collect data. Quick sounding mission to see what's actually out there.
    
    notes = Mission Objectives:\n\nReach Duna system with magnetometer-equipped probe.\nCollect and transmit electromagnetic data.\nDemonstrate interplanetary transfer capability.\n
    
    synopsis = Deploy an interplanetary probe to Duna system to investigate electromagnetic patterns and gather survey data.
    
    completedMessage = Probe has successfully reached Duna system and transmitted magnetometer data.\n\nStand by for comprehensive analysis results.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = RedFrontier
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 1825  // 5 years - includes transfer time
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Exceptional
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after SS1 and Rubicon completion
    REQUIREMENT
    {
        name = CompleteSS1
        title = Complete Strange Signals I
        type = CompleteContract
        contractType = SS1_Detection
    }
    REQUIREMENT
    {
        name = CompleteRubicon
        title = Complete Rubicon
        type = CompleteContract
        contractType = PR_Mission12_ISRUDeployment
    }
    
    // Requires M700 Survey Scanner technology available
    REQUIREMENT
    {
        name = CanResearchM700
        type = CanResearchTech
        part = SurveyScanner
    }
    
    // Rewards - interplanetary mission, substantial rewards
    advanceFunds = 30000.0
    rewardFunds = 200000.0
    rewardScience = 150.0
    rewardReputation = 25.0
    
    // Target Body
    targetBody = Duna
    
    // Track mission completion - TRIGGERS PATHFINDER
    DATA
    {
        type = bool
        strange_signals_2_complete = true
        persist = true
    }
    
//==========================================================================================
// SS2 PARAMETERS - Interplanetary Probe Development
//==========================================================================================
    
    PARAMETER
    {
        name = InterplanetaryProbeDevelopment
        type = VesselParameterGroup
        title = Develop Interplanetary Survey Probe
        
        define = Duna Survey Probe
        
        PARAMETER
        {
            name = HasMagnetometer
            type = PartValidation
            part = Magnetometer
            minCount = 1
            title = Must have Magnetometer sensor
            hideChildren = true
        }
        
        
        PARAMETER
        {
            name = HasAntenna
            type = PartValidation
            partModule = ModuleDataTransmitter
            minCount = 1
            title = Must have communications capability
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Must have power generation (solar panels)
            hideChildren = true
        }
        
        PARAMETER
        {
            name = Crewless
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Must be uncrewed (autonomous operations)
            hideChildren = true
        }
    }
    
//==========================================================================================
// SS2 OBJECTIVES - Duna System Operations
//==========================================================================================
    
    PARAMETER
    {
        name = DunaApproach
        type = VesselParameterGroup
        title = Reach Duna System
        notes = Execute interplanetary transfer and reach Duna's orbital altitude.
        
        vessel = Duna Survey Probe
        
        PARAMETER
        {
            name = ReachDuna
            type = ReachState
            targetBody = Duna
            situation = ESCAPING
            situation = ORBITING
            situation = SUB_ORBITAL
            title = Reach Duna system (orbit or flyby trajectory)
        }
    }
    
    PARAMETER
    {
        name = MagnetometerData
        type = VesselParameterGroup
        title = Collect Magnetometer Data
        notes = Transmit magnetometer readings from Duna vicinity to characterize electromagnetic environment.
        
        vessel = Duna Survey Probe
        
        PARAMETER
        {
            name = CollectMagnetometer
            type = CollectScience
            experiment = magnetometer
            targetBody = Duna
            recoveryMethod = Transmit
            title = Transmit magnetometer data from Duna
        }
    }
        
//==========================================================================================
// SS2 COMPLETION DIALOG - Inline (3 boxes)
//==========================================================================================
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = DunaApproach
            position = CENTER
            title = Data Analysis
            titleColor = #4CAF50
            width = 0.4
            
            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = true_thumbsUp
            }
            
            TEXT
            {
                text = Probe is in the Duna system. Magnetometer is active and collecting.\n\nFirst readings are coming in. Signal strength at proximity is significantly higher than our Kerbin baseline. Whatever is generating this, it is close.
                fontSize = 20
            }
        }
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = SurveyData
            position = CENTER
            title = Investigation Recommended
            titleColor = #2196F3
            width = 0.4
            
            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }
            
            TEXT
            {
                text = Data received. Patterns are concentrated in the Duna-Ike region. Localized, not planetary-scale. No known natural mechanism fits the profile.\n\nDuna is one data point. The question is whether it is unique.
                fontSize = 20
            }
        }
        
        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
	    parameter = SurveyData
            position = CENTER
            title = Pathfinder Program Authorization
            titleColor = #FF9800
            width = 0.4
            
            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_smileA
            }
            
            TEXT
            {
                text = The Council has reviewed the findings. We are not done looking.\n\nValidation and deployment operations targeting the Duna system are authorized. Survey, resource assessment, infrastructure. Everything you have proven, now applied at range.\n\nMore will follow. Get started.
                fontSize = 20
            }
        }
    }
}
