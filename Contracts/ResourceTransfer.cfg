//==========================================================================================
// DEBUG CONTRACT - ResourceTransfer Parameter Validation
// Tests all evaluation paths against the Minmus ISRU Lander.
// Blocked from completion by ReachState (Kerbin landed) — runs indefinitely.
// Each ResourceTransfer parameter re-evaluates continuously — trigger and reset
// by filling/draining tanks on the rover. Snapshot is taken at contract acceptance.
//==========================================================================================

CONTRACT_TYPE
{
    name = DEBUG_ResourceTransferValidation
    title = [DEBUG] ResourceTransfer Parameter Validation
    
    description = Developer test contract. Validates all ResourceTransfer evaluation paths against the Minmus ISRU Lander. All parameters run simultaneously with no sequence. Fill and drain ore tanks to observe each parameter flip independently. Contract cannot complete — blocked by Kerbin landed requirement.
    
    synopsis = ResourceTransfer parameter validation harness.
    completedMessage = This contract should never complete.
    
    agent = Kerbal Initiatives Division
    group = Pathfinder

    minExpiry = 0
    maxExpiry = 0
    deadline = 0
    cancellable = true
    declinable = true
    autoAccept = false
    prestige = Trivial
    maxCompletions = 0
    maxSimultaneous = 1

    // No REQUIREMENT block — always available in Mission Control

    advanceFunds = 0.0
    rewardFunds = 0.0
    rewardScience = 0.0
    rewardReputation = 0.0

    targetBody = Minmus

//==========================================================================================
// PERMANENT COMPLETION BLOCK
// Contract cannot complete while this fails.
// Player must be landed on Kerbin to satisfy it — impossible from Minmus.
//==========================================================================================

    PARAMETER
    {
        name = NeverComplete
        type = ReachState
        targetBody = Kerbin
        situation = LANDED
        title = [BLOCK] Landed on Kerbin — contract cannot complete
        hideChildren = true
    }

//==========================================================================================
// GROUP A — Fraction-based detection (capacity-agnostic)
// These pass/fail based on current amount / capacity regardless of tank size.
//==========================================================================================

    PARAMETER
    {
        name = Group_FractionBased
        type = VesselParameterGroup
        title = [A] Fraction-Based Detection
        vessel = Minmus ISRU Lander
        notes = Evaluates amount/capacity ratio. Works correctly for any tank size.

        PARAMETER
        {
            name = A1_TanksNearEmpty
            type = ResourceTransfer
            resource = Ore
            fractionMax = 0.05
	    disableOnStateChange = true
            title = [A1] Ore tanks near-empty (≤5% full)
            // EXPECTED: passes when ore ≤ 5% of capacity. Clears when you start mining.
        }

        PARAMETER
        {
            name = A2_TanksSubstantiallyFull
            type = ResourceTransfer
            resource = Ore
            fractionMin = 0.80
	    disableOnStateChange = true
            title = [A2] Ore tanks substantially full (≥80% full)
            // EXPECTED: passes only when ore ≥ 80% of capacity. Clears when you drain.
        }

        PARAMETER
        {
            name = A3_TanksMidBand
            type = ResourceTransfer
            resource = Ore
            fractionMin = 0.30
            fractionMax = 0.70
	    disableOnStateChange = true
            title = [A3] Ore tanks in mid-band (30–70% full)
            // EXPECTED: passes only when ore is between 30% and 70% capacity.
            //           Tests simultaneous fractionMin + fractionMax constraint.
        }
    }

//==========================================================================================
// GROUP B — Delta-based detection (operation proof)
// Snapshot taken at contract acceptance. Evaluates change since then.
//==========================================================================================

    PARAMETER
    {
        name = Group_DeltaBased
        type = VesselParameterGroup
        title = [B] Delta-Based Detection (snapshot at acceptance)
        vessel = Minmus ISRU Lander
        notes = Snapshot taken when contract is accepted. All deltas are relative to that baseline.

        PARAMETER
        {
            name = B1_ExtractionDelta
            type = ResourceTransfer
            resource = Ore
            deltaMin = 200.0
	    disableOnStateChange = true
            title = [B1] Extracted 200+ units since acceptance
            // EXPECTED: passes once you have mined 200+ units beyond the acceptance snapshot.
            //           Cannot be satisfied by tanks that were pre-filled before acceptance.
        }

        PARAMETER
        {
            name = B2_DepletionDelta
            type = ResourceTransfer
            resource = Ore
            deltaMax = -200.0
	    disableOnStateChange = true
            title = [B2] Depleted 200+ units since acceptance
            // EXPECTED: passes once ore has decreased by 200+ units from the acceptance snapshot.
            //           Start with full tanks, then drain to trigger.
        }

        PARAMETER
        {
            name = B3_BoundedDelta
            type = ResourceTransfer
            resource = Ore
            deltaMin = 100.0
            deltaMax = 400.0
	    disableOnStateChange = true
            title = [B3] Delta in range: +100 to +400 units since acceptance
            // EXPECTED: passes when net change is between +100 and +400.
            //           Tests simultaneous deltaMin + deltaMax constraint.
            //           Will fail again if you keep mining past +400.
        }
    }

//==========================================================================================
// GROUP C — Mixed constraints
// Combines delta and fraction in a single parameter. All specified fields must pass.
//==========================================================================================

    PARAMETER
    {
        name = Group_Mixed
        type = VesselParameterGroup
        title = [C] Mixed Constraints (delta + fraction simultaneously)
        vessel = Minmus ISRU Lander
        notes = Both delta and fraction constraints must pass at the same time.

        PARAMETER
        {
            name = C1_ExtractedAndFull
            type = ResourceTransfer
            resource = Ore
            deltaMin = 100.0
            fractionMin = 0.70
	    disableOnStateChange = true
            title = [C1] Extracted 100+ units AND tanks ≥70% full
            // EXPECTED: proves mining happened AND tanks are substantially full.
            //           Neither condition alone is sufficient.
            //           This is the pattern for validating a complete extraction run.
        }

        PARAMETER
        {
            name = C2_DrainedAndEmpty
            type = ResourceTransfer
            resource = Ore
            deltaMax = -50.0
            fractionMax = 0.10
	    disableOnStateChange = true
            title = [C2] Depleted 50+ units AND tanks ≤10% full
            // EXPECTED: proves consumption happened AND tanks are nearly empty.
            //           Pattern for validating delivery (ore transferred to another vessel).
        }
    }

//==========================================================================================
// GROUP D — Stock parameter comparison
// HasResource and HasResourceCapacity for direct comparison with ResourceTransfer results.
// These are the stock CC approaches being validated against.
//==========================================================================================

    PARAMETER
    {
        name = Group_StockComparison
        type = VesselParameterGroup
        title = [D] Stock Parameter Comparison (HasResource / HasResourceCapacity)
        vessel = Minmus ISRU Lander
        notes = Stock CC parameters for side-by-side comparison. These cannot detect deltas or capacity fractions.

        PARAMETER
        {
            name = D1_AbsoluteFloor
            type = HasResource
            resource = Ore
            minQuantity = 300.0
            title = [D1] HasResource: Ore ≥ 300 units (absolute)
	    disableOnStateChange = true
            hideChildren = true
            // EXPECTED: passes whenever ore ≥ 300 regardless of when or how it got there.
            //           Compare with B1 — B1 requires mining happened; D1 does not.
        }

        PARAMETER
        {
            name = D2_AbsoluteCeiling
            type = HasResource
            resource = Ore
            maxQuantity = 50.0
            title = [D2] HasResource: Ore ≤ 50 units (absolute)
	    disableOnStateChange = true
            hideChildren = true
            // EXPECTED: passes whenever ore ≤ 50 regardless of capacity.
            //           Compare with A1 — A1 is capacity-relative; D2 is hardcoded.
        }

        PARAMETER
        {
            name = D3_CapacityCheck
            type = HasResourceCapacity
            resource = Ore
            minQuantity = 400.0
            title = [D3] HasResourceCapacity: Ore capacity ≥ 400 units
	    disableOnStateChange = true
            hideChildren = true
            // EXPECTED: always passes or always fails based on rover design.
            //           Confirms the rover has sufficient tank capacity for PF3 operations.
            //           Not dynamic — this is a vessel design check, not an operation check.
        }
    }
}