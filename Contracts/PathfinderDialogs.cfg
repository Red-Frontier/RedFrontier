//==========================================================================================
// PATHFINDER PROGRAM - NARRATIVE DIALOG CONTRACTS
// These contracts provide narrative transitions for Pathfinder missions
// Total: 1 Intro + 3 Transitions + 1 Completion + 1 End Card = 18 dialog boxes
// Note: PF4 and PF7 have inline in-mission dialogs in main Pathfinder.cfg
//==========================================================================================

//==========================================================================================
// PROGRAM INTRODUCTION - Triggers on first Pathfinder mission acceptance
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Intro_Dialog
    title = Pathfinder Program Authorization
    
    description = The Council has authorized Pathfinder Program.
    synopsis = The Council has authorized Pathfinder Program.
    completedMessage = Pathfinder missions are now available.
    
    agent = Kerbal Initiatives Division
    group = Pathfinder
    
    minExpiry = 0
    maxExpiry = 0
    deadline = 1
    cancellable = false
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    advanceFunds = 0
    rewardFunds = 0
    rewardScience = 0
    rewardReputation = 0
    
    targetBody = Kerbin
    
    // Triggers when Pathfinder program is accepted
    REQUIREMENT
    {
        name = AcceptPF1
        type = AcceptContract
        contractType = PF_Mission1_ResourceSurvey
    }
    
    PARAMETER
    {
        name = AutoComplete
        type = Duration
        duration = 1s
        preWaitText = ""
        waitingText = ""
        completionText = ""
    }
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Pathfinder Program Authorization
            titleColor = #FF9800
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_smileA
            }

            TEXT
            {
                text = Strange Signals put Duna on the board. The Council has authorized the next phase -- Pathfinder Program.\\n\\nSame methodology as Rubicon: prove it locally, then send it. We're not shipping hardware to another planet on the assumption it works. Everything going to Duna gets validated here first.
                fontSize = 20
            }
        }

        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Validation Phase
            titleColor = #2196F3
            width = 0.5

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }

            TEXT
            {
                text = Three missions, but one question: can we sustain operations at another world without a supply line from Kerbin?\\n\\nEverything on that roster is designed to answer it. By the time the rover completes its extraction cycle, you'll have exercised the full operational stack under real mission conditions -- not as isolated checkboxes, but as the integrated system that has to work at Ike before we can call Pathfinder a success.\\n\\nMinmus is forgiving. Ike is not. Use that.
                fontSize = 20
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = The Fleet
            titleColor = #4CAF50
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_thumbsUp
            }

            TEXT
            {
                text = Here's how it connects. The station leaves Kerbin crewed and fully equipped -- science lab, logistics hub, the relay constellation integrated for transit. It goes to Duna orbit and stays there. That's the anchor for everything that follows.\\n\\nThe Ike expedition carries the resource operation: the survey hardware, the extraction and processing system, the cargo capacity to move fuel from the surface to orbit. The rover you prove at Minmus is the rover that goes to Ike. The survey methodology you validate here is what selects the landing site. Nothing on that manifest is untested.\\n\\nBoth vessels depart on the same transfer window. When the Ike ISRU cycle is running and fuel is flowing to the station, the Duna system is self-sufficient. That's the answer to Linus's question. That's what we're building toward.
                fontSize = 20
            }
        }
    }
}

//==========================================================================================
// MISSION 1 → 2 TRANSITION
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Mission1_Dialog
    title = Mission Update
    
    description = Status update from Mission Control.
    synopsis = Status update from Mission Control.
    completedMessage = Message acknowledged.
    
    agent = Kerbal Initiatives Division
    group = Pathfinder
    
    minExpiry = 0
    maxExpiry = 0
    deadline = 1
    cancellable = false
    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    advanceFunds = 0
    rewardFunds = 0
    rewardScience = 0
    rewardReputation = 0
    
    targetBody = Kerbin
    
    REQUIREMENT
    {
        name = Mission1Complete
        type = CompleteContract
        contractType = PF_Mission1_ResourceSurvey
    }
    
    PARAMETER
    {
        name = AutoComplete
        type = Duration
        duration = 1s
        preWaitText = ""
        waitingText = ""
        completionText = ""
    }
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Survey Technology Validated
            titleColor = #4CAF50
            width = 0.4

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = true_thumbsUp
            }

            TEXT
            {
                text = Orbital predictions matched the surface samples from our early Minmus operations. The M700 isn't just detecting ore -- it's accurately characterising concentration at depth.\\n\\nBut that's two data points. Before we stake an Ike ISRU deployment on this methodology, we need it to hold across different geology, different biomes, planet-wide coverage. That's your next mission.
                fontSize = 20
            }
        }
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Ground Truth Required
            titleColor = #2196F3
            width = 0.4

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_wonder
            }

            TEXT
            {
                text = The survey team is already on Minmus. They need the hardware.\\n\\nFour sites. Each one needs a Central Station, a solar panel, and a seismic sensor. That's twelve pieces of kit, and the sites are spread far enough apart that you're not walking between them. Load it in one cargo run to our surface outpost for distribution, plan the hops, and deploy as you see fit.\\n\\nYou'll want to think about fuel before you commit to the manifest. Minmus ISRU is an option if you're short on margin -- the ore is right there. Use it if you need it.
                fontSize = 20
            }
        }
    }
}

