    declinable = false
    autoAccept = true
    prestige = Trivial
    maxCompletions = 1
    maxSimultaneous = 1
    
    advanceFunds = 0
    rewardFunds = 0
    rewardScience = 0
    rewardReputation = 0
    
    targetBody = Kerbin
    
    REQUIREMENT
    {
        name = Mission2Complete
        type = CompleteContract
        contractType = PF_Mission2_OreProspecting
    }
    
    PARAMETER
    {
        name = AutoComplete
        type = Duration
        duration = 1s
        preWaitText = ""
        waitingText = ""
        completionText = ""
    }
    
    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Proving Ground
            titleColor = #2196F3
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = This is a two-vessel operation. The rover goes down, extracts and processes, and waits. The cargo lander goes down to meet it, takes on the full load, and brings it back to the station.\\n\\nNothing about that sequence is exotic. You have landed, you have docked, you have moved resources. What you have not done is run the complete cycle as an integrated system, under operational conditions, with the station as the destination.\\n\\nThat is what this mission is. The rover design you prove here is the hardware going to Ike. Make the cycle work.
                fontSize = 18
            }
        }
    }
}

