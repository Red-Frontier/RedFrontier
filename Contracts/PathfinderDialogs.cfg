    BEHAVIOUR
    {
        type = DialogBox
        
        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Departure
            titleColor = #2196F3
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = Two vessels with full manifests, on the same transfer window, and everything that is required to establish a permanent foothold. The station carries the crew, the lab, the logistics infrastructure, and the relay pair goes with it for the crossing. The Ike expedition carries the resource operation to survey, extract, and process regolith into useful resources. The complete logistics pair, everything on both manifests was proven before it was packed.\n\nAssemble in high Kerbin orbit. Fill the transfer stages. When both are ready, commit.\n\nThis is not a test. You do not get to turn around.
                fontSize = 18
            }
        }
    }
}

