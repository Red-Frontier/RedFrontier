//==========================================================================================
// PATHFINDER PROGRAM - PHASE 1: MISSION PLANNING
// Mission 1: Resource Survey Technology
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Mission1_ResourceSurvey
    title = Pathfinder 1: "Eyes in the Sky"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Resource Survey Division\nTO: Mission Control\nSUBJECT: Pathfinder Program - Orbital Survey Technology Validation\n\nStrange Signals investigation confirmed Duna system as exploration target. The Council has authorized Pathfinder Program: systematic validation and deployment operations for Duna infrastructure.\n\nPathfinder follows Rubicon methodology - validate technologies locally, then deploy to target. Before expensive interplanetary ISRU operations, the Council requires proof of orbital resource survey capability.\n\nDeploy M700 Survey Scanners to polar orbits around both Mun and Minmus. Complete comprehensive resource mapping of both bodies. The M700 detects subsurface ore concentrations from orbit - critical for identifying optimal ISRU sites before committing to landing operations.\n\nBoth surveys required. Single integrated mission or staged deployment - your decision. Polar orbits (80-100° inclination) provide complete surface coverage.\n\nValidate survey technology.
        
    synopsis = Deploy M700 Survey Scanners to polar orbits around both Mun and Minmus to validate orbital survey technology.
    
    completedMessage = Survey technology validated. Both orbital surveys complete.\n\nPathfinder 2 is now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = Pathfinder
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 730  // 2 years for dual deployment
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Strange Signals 2 completion
    REQUIREMENT
    {
        name = CompleteStrangeSignals2
        title = Complete Strange Signals II
        type = CompleteContract
        contractType = SS2_Investigation
    }
    
    // Requires M700 Survey Scanner available
    REQUIREMENT
    {
        name = CanResearchM700
        type = CanResearchTech
        part = SurveyScanner
    }
    
    // Rewards - first pathfinder mission, dual deployment
    advanceFunds = 25000.0
    rewardFunds = 100000.0
    rewardScience = 100.0
    rewardReputation = 15.0
    
    // Track mission completion for progression
    DATA
    {
        type = bool
        pathfinder_mission1_complete = true
        persist = true
    }
    
//==========================================================================================
// OBJECTIVES - MUN POLAR ORBIT SURVEY
//==========================================================================================
    
    PARAMETER
    {
        name = MunSurveyOperations
        type = VesselParameterGroup
        title = Place a survey satellite Mun Polar Orbit
        notes =  \nOptional Efficiency Challenge: A Mun flyby can provide a gravity assist toward Minmus, allowing a single launch to service both bodies.\n
        
        PARAMETER
        {
            name = MunOrbit
            type = Orbit
            targetBody = Mun
            minInclination = 80
            maxInclination = 100
            minPeA = 25000
            maxApA = 250000
	    hideChildren = true
            title = Achieve Mun polar orbit (80-100° inclination, 25-250km altitude)
        }
        
        PARAMETER
        {
            name = HasM700Scanner
            type = PartValidation
            part = SurveyScanner
            minCount = 1
            title = Satellite must have M700 Survey Scanner
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Satellite must have power generation
	    hideChildren = true
        }
        
    }
    
//==========================================================================================
// OBJECTIVES - MINMUS POLAR ORBIT SURVEY
//==========================================================================================
    
    PARAMETER
    {
        name = MinmusSurveyOperations
        type = VesselParameterGroup
        title = Place a survey satellite Minmus Polar Orbit
        notes = \nMinmus serves as our Ike analog due to similar low-gravity conditions.\n
        
        PARAMETER
        {
            name = MinmusOrbit
            type = Orbit
            targetBody = Minmus
            minInclination = 80
            maxInclination = 100
            minPeA = 10000
            maxApA = 100000
	    hideChildren = true
            title = Achieve Minmus polar orbit (80-100° inclination, 10-100km altitude)
        }
        
        PARAMETER
        {
            name = HasM700Scanner
            type = PartValidation
            part = SurveyScanner
            minCount = 1
            title = Vessel must have M700 Survey Scanner
            hideChildren = true
        }
        
        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Vessel must have power generation
	    hideChildren = true
        }
    }
}

//==========================================================================================
// PATHFINDER 2: "Ground Truth"
// Deploy geological research outposts at four survey sites
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Mission2_OreProspecting
    title = Pathfinder 2: "Ground Truth"

    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Resource Survey Division\nTO: Mission Control\nSUBJECT: Pathfinder Program - Geological Network Deployment\n\nOrbital survey complete. The M700 data identifies four high-priority sites across Minmus with promising ore concentrations. Before committing to ISRU deployment, the Council requires ground-truth verification via a permanent geological monitoring network.\n\nDeploy a seismic research outpost at each site: Central Station, solar power unit, and seismic sensor. Four sites, four independent outposts. The deployed network will transmit passive geological data long after this mission closes.\n\nThis is a logistics problem. The equipment is heavy and the sites are far apart - returning to Kerbin for resupply is not operationally viable. Plan your cargo manifest carefully.\n\nNote: Minmus ore deposits are confirmed by orbital survey. Engineers familiar with ISRU technology may find that local resource utilization offers solutions to the fuel logistics challenge this mission presents.\n\nEstablish the network.

    synopsis = Deploy seismic research outposts at four survey sites across Minmus - Central Station, solar panel, and seismic sensor at each location.

    completedMessage = Geological network established. All four outposts transmitting.\n\nThe seismic data confirms orbital survey predictions across all sites. Analysis teams are now correlating multi-site geological data to identify optimal ISRU placement.\n\nPathfinder 3 is now available.

    agent = Kerbal Initiatives Division
    group = Pathfinder

    minExpiry = 0
    maxExpiry = 0
    deadline = 730
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1

    REQUIREMENT
    {
        name = CompletePathfinder1
        type = CompleteContract
        contractType = PF_Mission1_ResourceSurvey
    }

    advanceFunds = 25000.0
    rewardFunds = 120000.0
    rewardScience = 100.0
    rewardReputation = 20.0

    targetBody = Minmus

    DATA
    {
        type = bool
        persist = true
        pathfinder_mission2_complete = true
    }

//==========================================================================================
// WAYPOINT GENERATION - Four Survey Sites
//==========================================================================================

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        RANDOM_WAYPOINT
        {
            name = Survey Site Alpha
            icon = seismic
            altitude = 0.0
            waterAllowed = false
            targetBody = Minmus
        }

        RANDOM_WAYPOINT_NEAR
        {
            name = Survey Site Beta
            icon = seismic
            altitude = 0.0
            nearIndex = 0
            minDistance = 50000.0
            maxDistance = 150000.0
            waterAllowed = false
            targetBody = Minmus
        }

        RANDOM_WAYPOINT_NEAR
        {
            name = Survey Site Gamma
            icon = seismic
            altitude = 0.0
            nearIndex = 0
            minDistance = 50000.0
            maxDistance = 150000.0
            waterAllowed = false
            targetBody = Minmus
        }

        RANDOM_WAYPOINT_NEAR
        {
            name = Survey Site Delta
            icon = seismic
            altitude = 0.0
            nearIndex = 0
            minDistance = 50000.0
            maxDistance = 150000.0
            waterAllowed = false
            targetBody = Minmus
        }
    }

//==========================================================================================
// EQUIPMENT CHECK - Cargo manifest validation
//==========================================================================================

    PARAMETER
    {
        name = CargoManifest
        type = VesselParameterGroup
        title = Cargo lander must carry full deployment kit (4 outposts)

        PARAMETER
        {
            name = HasCentralStations
            type = HasInventoryPart
            part = DeployedCentralStation
            minCount = 4
            title = 4x Experiment Control Station (in cargo)
        }

        PARAMETER
        {
            name = HasSolarPanels
            type = HasInventoryPart
            part = DeployedSolarPanel
            minCount = 4
            title = 4x OX-Stat-PD Photovoltaic Panel (in cargo)
        }

        PARAMETER
        {
            name = HasSeismicSensors
            type = HasInventoryPart
            part = DeployedSeismicSensor
            minCount = 4
            title = 4x Grand Slam Passive Seismometer (in cargo)
        }
    }

//==========================================================================================
// OBJECTIVES - Four Outpost Deployments (any order)
//==========================================================================================

    PARAMETER
    {
        name = OutpostDeployments
        type = All
        title = Establish all four geological research outposts

        notes = Each outpost requires one Central Station, one Solar Panel, and one Seismic Sensor.\nNote: Solar panels produce 2 power units when deployed by an Engineer, 1 power unit otherwise.

//──────────────────────────────────────────────────────────────────────
// OUTPOST ALPHA  (waypointIndex = 0)
//──────────────────────────────────────────────────────────────────────

	PARAMETER
        {
	    name = SequenceAlpha
  	    type = All
	    title = Deploy Science at Outpost Alpha
	    hiddenParameter = StationAlphaDetected

	    PARAMETER
            {
		name = OutpostAlpha
		type = VesselParameterGroup
		title = Land within 2.5km of Survey Site Alpha

		PARAMETER
		{
		    name = ReachWaypointAlpha
		    type = VisitWaypoint
		    index = 0
		    distance = 2500
		    horizontalDistance = 2500
		    title = Land within 2.5km of Survey Site Alpha
		    hidden = true
		}
		PARAMETER
		{
		    name = ReachStateAlpha
		    type = ReachState
		    targetBody = Minmus
		    situation = LANDED
		    disableOnStateChange = true
		    completeInSequence = true
		    hidden = true
		}
            }

            PARAMETER
            {
   		name = StationAlphaDetected
		type = DeployedScienceStation
 		waypointIndex = 0
		distance = 2500
		title = Deploy Experiment Control Station
		hideChildren = true
		define = StationAlpha
	    }
	}

//──────────────────────────────────────────────────────────────────────
// OUTPOST BETA  (waypointIndex = 1)
//──────────────────────────────────────────────────────────────────────
	PARAMETER
        {
	    name = SequenceBeta
  	    type = All
	    title = Deploy Science at Outpost Beta
	    hiddenParameter = StationBetaDetected

	    PARAMETER
	    {
		name = OutpostBeta
		type = VesselParameterGroup
		title = Land within 2.5km of Survey Site Beta

		PARAMETER
		{
		    name = ReachWaypointBeta
		    type = VisitWaypoint
		    index = 1
		    distance = 2500
		    horizontalDistance = 2500
		    title = Land within 2.5km of Survey Site Beta
		    hidden = true
		}
		PARAMETER
		{
		    name = ReachStateBeta
		    type = ReachState
		    targetBody = Minmus
		    situation = LANDED
		    disableOnStateChange = true
		    completeInSequence = true
		    hidden = true
		}
            }

            PARAMETER
            {
   		name = StationBetaDetected
		type = DeployedScienceStation
 		waypointIndex = 1
		distance = 2500
		title = Deploy Experiment Control Station
		hideChildren = true
		define = StationBeta
	    }
        }

//──────────────────────────────────────────────────────────────────────
// OUTPOST GAMMA  (waypointIndex = 2)
//──────────────────────────────────────────────────────────────────────
	PARAMETER
        {
	    name = SequenceGamma
  	    type = All
	    title = Deploy Science at Outpost Gamma
	    hiddenParameter = StationGammaDetected

	    PARAMETER
	    {
		name = OutpostGamma
		type = VesselParameterGroup
		title = Land within 2.5km of Survey Site Gamma

		PARAMETER
		{
		    name = ReachWaypointGamma
		    type = VisitWaypoint
		    index = 2
		    distance = 2500
		    horizontalDistance = 2500
		    title = Land within 2.5km of Survey Site Gamma
		    hidden = true
		}
		PARAMETER
		{
		    name = ReachStateGamma
		    type = ReachState
		    targetBody = Minmus
		    situation = LANDED
		    disableOnStateChange = true
		    completeInSequence = true
		    hidden = true
		}
            }

            PARAMETER
            {
   		name = StationGammaDetected
		type = DeployedScienceStation
 		waypointIndex = 2
		distance = 2500
		title = Deploy Experiment Control Station
		hideChildren = true
		define = StationGamma
	    }
        }

//──────────────────────────────────────────────────────────────────────
// OUTPOST DELTA  (waypointIndex = 3)
//──────────────────────────────────────────────────────────────────────
	PARAMETER
        {
	    name = SequenceDelta
  	    type = All
	    title = Deploy Science at Outpost Delta
	    hiddenParameter = StationDeltaDetected

	    PARAMETER
            {
		name = OutpostDelta
		type = VesselParameterGroup
		title = Land within 2.5km of Survey Site Delta

		PARAMETER
		{
		    name = ReachWaypointDelta
		    type = VisitWaypoint
		    index = 3
		    distance = 2500
		    horizontalDistance = 2500
		    title = Land within 2.5km of Survey Site Delta
		    hidden = true
                }
	        PARAMETER
                {
		    name = ReachStateDelta
		    type = ReachState
		    targetBody = Minmus
		    situation = LANDED
		    disableOnStateChange = true
		    completeInSequence = true
		    hidden = true
	        }
            }

            PARAMETER
            {
   		name = StationDeltaDetected
		type = DeployedScienceStation
 		waypointIndex = 3
		distance = 2500
		title = Deploy Experiment Control Station
		hideChildren = true
		define = StationDelta
	    }
	}
    }
	
//==========================================================================================
// NETWORK CONFIRMATION
//==========================================================================================

    PARAMETER
    {
        name = NetworkConfirmation
        type = Duration
        duration = 10s
	completeInSequence = true
        preWaitText = Receiving network telemetry from all sites
        waitingText = Correlating multi-site geological data
        completionText = All four outposts confirmed - geological network online!
        hideChildren = true
    }

//==========================================================================================
// BEHAVIORS - Site completion messages
//==========================================================================================

    BEHAVIOUR
    {
        name = OutpostAlphaComplete
        type = Message
        title = Outpost Alpha Online
        message = Mission Control here. We're receiving telemetry from Outpost Alpha. Central Station is coordinating power and data transmission from the seismic sensor.\n\nGeological data quality looks good. Continue to remaining sites.

        CONDITION
        {
            condition = PARAMETER_COMPLETED
            parameter = OutpostAlpha
        }
    }

    BEHAVIOUR
    {
        name = OutpostBetaComplete
        type = Message
        title = Outpost Beta Online
        message = Outpost Beta is transmitting. Seismic baseline looks different from Alpha - we're seeing the biome variation we expected. Two down, two to go.

        CONDITION
        {
            condition = PARAMETER_COMPLETED
            parameter = OutpostBeta
        }
    }

    BEHAVIOUR
    {
        name = OutpostGammaComplete
        type = Message
        title = Outpost Gamma Online
        message = Gamma online. Three sites confirmed. The geological cross-section we're building across these biomes is exactly what the analysis teams needed. One more site.

        CONDITION
        {
            condition = PARAMETER_COMPLETED
            parameter = OutpostGamma
        }
    }

    BEHAVIOUR
    {
        name = OutpostDeltaComplete
        type = Message
        title = Network Complete
        message = Outpost Delta online. All four sites transmitting.\n\nStand by while Mission Control correlates the full network dataset.

        CONDITION
        {
            condition = PARAMETER_COMPLETED
            parameter = OutpostDelta
        }
    }
}
//==========================================================================================
// PATHFINDER PROGRAM - PHASE 1: MISSION PLANNING
// Mission 3: Ike ISRU Rover Validation
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Mission3_IkeRoverValidation
    title = Pathfinder 3: "Proving Ground"
    
    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Resource Utilization Division\nTO: Mission Control\nSUBJECT: Pathfinder Program - ISRU Prototype Validation\n\nGeological network complete. Survey methodology validated. Council has cleared industrial-scale ISRU operations.\n\nIke operations will require refueling interplanetary transfer stages - not landing craft. Full crewed missions returning from Duna surface. Delta-V requirements measured in kilometers per second, not hundreds of meters.\n\nYour Minmus outpost provides the proving ground. Deploy industrial ISRU infrastructure capable of producing fuel at scale. Demonstrate complete operational cycle: autonomous extraction, bulk fuel production, orbital delivery to Minmus Orbital Station.\n\nThe system you validate here deploys to Ike. If it fails there, crew rescue becomes a cross-solar-system operation. Scale matters.\n\nProve industrial capacity.
    
    notes = Mission Objectives:\n\nIndustrial ISRU Deployment\nDeploy ISRU infrastructure to Minmus surface capable of bulk fuel production operations.\n\nResource Extraction Operations\nDemonstrate ore mining capability extracting minimum 400 units without constant supervision..\n\nFuel Production Systems\nProcess ore and produce minimum 400 units each of Liquid Fuel and Oxidizer from local resources.\n\nOrbital Logistics Validation\nReturn to orbit with fuel payload and dock with Minmus Science Station, proving complete logistics cycle.
    
    synopsis = Deploy industrial-scale ISRU infrastructure to Minmus and demonstrate bulk fuel production capability with orbital delivery.
    
    completedMessage = Industrial ISRU cycle demonstrated. Bulk fuel production validated. Orbital delivery confirmed.\n\nThe system you've proven at Minmus becomes the operational infrastructure deployed to Ike. Scale and capacity verified.\n\nDeployment missions are now available.
    
    // Contract parameters
    agent = Kerbal Initiatives Division
    group = Pathfinder
    
    // Contract requirements
    minExpiry = 0
    maxExpiry = 0
    deadline = 730
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1
    
    // Available after Pathfinder 2 completion
    REQUIREMENT
    {
        name = CompletePathfinder2
        title = Complete Pathfinder 2
        type = CompleteContract
        contractType = PF_Mission2_OreProspecting
    }
        
    // Rewards - final required mission before deployment phase
    advanceFunds = 30000.0
    rewardFunds = 180000.0
    rewardScience = 200.0
    rewardReputation = 30.0
    
    // Target Body
    targetBody = Minmus
    
    // Track mission completion for progression
    DATA
    {
        type = bool
        pathfinder_mission3_complete = true
        persist = true
    }
    
//==========================================================================================
// VALIDATION PARAMETERS - Ike Rover Design
//==========================================================================================
          
    PARAMETER
    {
        name = IkeRoverDesign
        type = VesselParameterGroup
        title = Ike ISRU Rover Design Validation
        notes = Design a rover with all systems required for autonomous Ike operations: drilling, processing, power, storage, and demonstrate orbital payload capability.

        PARAMETER
        {
            name = HasDrill
            type = PartValidation
            partModule = ModuleResourceHarvester
            minCount = 1
            title = Must have drilling equipment
            hideChildren = true
	    disableOnStateChange = true
        }
        
        PARAMETER
        {
            name = HasConverter
            type = PartValidation
            partModule = ModuleResourceConverter
            minCount = 1
            title = Must have fuel processing system
            hideChildren = true
	    disableOnStateChange = true
        }
        
        PARAMETER
        {
            name = HasOreStorage
            type = HasResourceCapacity
            resource = Ore
            minQuantity = 300.0
            title = Minimum 300 units ore storage capacity
            hideChildren = true
	    disableOnStateChange = true
        }
        
        PARAMETER
        {
            name = HasPowerGeneration
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 2
            title = Must have redundant power systems (minimum 2 solar arrays)
            hideChildren = true
	    disableOnStateChange = true
        }
    }

//==========================================================================================
// OBJECTIVES - Complete ISRU Operational Cycle
//==========================================================================================

    PARAMETER
    {
        name = ISRUOperationalCycle
        type = Sequence
        title = Demonstrate Complete ISRU Operational Cycle
	hiddenParameter = FuelProduction
	hiddenParameter = DeployCargoLander
	hiddenParameter = DockRefueling
	hiddenParameter = OrbitalLogistics

        PARAMETER
        {
            name = RoverDeployment
            type = VesselParameterGroup
            title = Deploy ISRU Rover on Minmus Surface
            define = Minmus ISRU Rover
            notes = Select a suitably high-ore site and deploy drills to fill ore tank
            PARAMETER
            {
                name = LandOnMinmus
                type = ReachState
                targetBody = Minmus
                situation = LANDED
                hidden = true
            }

            PARAMETER
            {
                name = ConfirmLanding
                type = ReachState
                situation = LANDED
                targetBody = Minmus
                completeInSequence = true
                hidden = true
            }

            PARAMETER
            {
                name = EmptyOreTanks
                type = HasResource
                resource = Ore
                maxQuantity = 1
                title = Land with empty ore tanks
                hideChildren = true
                disableOnStateChange = false
            }
        }

        PARAMETER
        {
            name = OreExtraction
            type = HasResource
            resource = Ore
            minQuantity = 300.0
            title = Extract 300 units of ore from surface deposits
	    disableOnStateChange = true
            hideChildren = true
        }

        PARAMETER
        {
            name = FuelProduction
            type = VesselParameterGroup
            title = Produce Fuel from Extracted Ore
            completeInSequence = true

            PARAMETER
            {
                name = LiquidFuelProduction
                type = ResourceTransfer
                resource = LiquidFuel
                fractionMin = 0.99
                title = Fill Liquid Fuel tanks
                hideChildren = true
		
            }

            PARAMETER
            {
                name = OxidizerProduction
                type = ResourceTransfer
                resource = Oxidizer
                fractionMin = 0.99
                title = Fill Oxidizer tanks
                hideChildren = true
            }
        }
	
//==========================================================================================
// OBJECTIVES - Cargo Lander Refuel
//==========================================================================================
	PARAMETER
        {
            name = DeployCargoLander
            type = VesselParameterGroup
            title = Deploy Modified Cargo Lander to Minmus
            completeInSequence = true
	    define = Minmus ISRU Lander
	    notes = Modify a cargo lander with 300+ Ore capacity to ferry resources back to orbit, and deploy it to the ISRU rover proving ground.


	    PARAMETER
	    {
		name = HasOreStorage
		type = HasResourceCapacity
		resource = Ore
		minQuantity = 300.0
		title = Minimum 300 units ore storage capacity
		hideChildren = true
		disableOnStateChange = true
            }
        
            PARAMETER
            {
		name = HasPowerGeneration
		type = PartValidation
		partModule = ModuleDeployableSolarPanel
		minCount = 2
		title = Must have redundant power systems (minimum 2 solar arrays)
		hideChildren = true
		disableOnStateChange = true
	    }

            PARAMETER
            {
		name = Rendezvous 
		type = Rendezvous
		vessel = Minmus ISRU Rover
		distance = 500
		title = Land within 500 Meters of the Rover
	    }
	}


	PARAMETER
        {
	    name = DockRefueling
	    type = All
	    title = Dock with the ISRU Demonstrator and refill all tanks

            PARAMETER
            {
		name = Ground Docking
		type = Docking
		vessel = Minmus ISRU Rover
 		vessel = Minmus ISRU Lander
		hideChildren = true
	    }

	    PARAMETER
	    {
		name = LanderTanksFull
		type = VesselParameterGroup
		title = Fill Lander Tanks for Return to Orbit with cargo
		completeInSequence = true

		PARAMETER
		{
		    name = OreFull
		    type = ResourceTransfer
		    resource = Ore
		    fractionMin = 0.95
		    title = Ore tanks full
		    hideChildren = true
		}
	
		PARAMETER
		{
		    name = LiquidFuelFull
		    type = ResourceTransfer
		    resource = LiquidFuel
		    fractionMin = 0.95
		    title = Liquid Fuel tanks full
		    hideChildren = true
		}
	
		PARAMETER
		{
		    name = OxidizerFull
		    type = ResourceTransfer
		    resource = Oxidizer
		    fractionMin = 0.95
		    title = Oxidizer tanks full
		    hideChildren = true
		}
	    }
	}

	    
//==========================================================================================
// OBJECTIVES - Orbital Logistics Integration
//==========================================================================================
	
        PARAMETER
        {
            name = OrbitalLogistics
            type = VesselParameterGroup
            title = Orbital Fuel Delivery Operations
            vessel = Minmus ISRU Lander
            completeInSequence = true

            PARAMETER
            {
                name = OrbitalReturn
                type = VesselParameterGroup
                title = Return to Orbit with Ore Payload
                completeInSequence = true

                PARAMETER
                {
                    name = AchieveOrbit
                    type = Orbit
                    targetBody = Minmus
                    minAltitude = 10000
                    hidden = true
                }

                PARAMETER
                {
                    name = OrePayload
                    type = HasResource
                    resource = Ore
                    minQuantity = 299.0
                    hidden = true
                }
            }

            PARAMETER
            {
                name = StationRendezvous
                type = Rendezvous
                title = Rendezvous with Minmus Science Station
                vessel = Minmus Orbital Station
                distance = 1000.0
                completeInSequence = true
                hideChildren = true
                notes = Reorbit to station and complete docking to validate fuel transfer capability and orbital logistics integration.
            }

            PARAMETER
            {
                name = StationDocking
                type = Docking
                vessel = Minmus Orbital Station
                title = Dock with Minmus Station
                hideChildren = true
                completeInSequence = true
            }
        }
    }

//==========================================================================================   
// BEHAVIORS - Unlock ISRU Parts
//==========================================================================================

    BEHAVIOUR
    {
        name = UnlockISRUParts
        type = ExperimentalPart
        part = MiniDrill
        part = MiniISRU
        part = RadialOreTank
        unlockCriteria = CONTRACT_ACCEPTANCE
    }

    BEHAVIOUR
    {
	name = dialogboxes
        type = DialogBox
        
	DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = OreExtraction
            position = CENTER
            title = In Situ
            titleColor = #7EC8E3
            width = 0.5

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }

            TEXT
            {
                text = What is in those tanks right now is water ice, silicates, and carbon compounds -- the same mix you would find in a carbonaceous asteroid or the surface of an icy moon anywhere in the system.\\n\\nThe converter separates it. Water gets split into hydrogen and oxygen through electrolysis. The carbon reacts with the hydrogen to produce liquid fuel. The oxygen is condensed into a liquid oxidizer for storage.\\n\\nThe hard part is not the chemistry. It is keeping the product stable -- cryogenic propellants want to boil off, and that is an engineering problem this system solves.
                fontSize = 18
            }
        }

	DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = StationRendezvous
            position = CENTER
            title = The Chain
            titleColor = #FF9800
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_nodA
            }

            TEXT
            {
                text = Fuel produced at the surface of another world is now in orbit. That is not a small thing.\\n\\nEvery step between the drill and this docking port was unproven not long ago. The extraction, the processing, the ascent, the rendezvous. We built the chain one link at a time and now it is running.\\n\\nWhen that system is running at Ike, the station does not need Kerbin for propellant. Crew rotation, supplies, everything else -- that is a problem we are already planning for. But fuel is the hard one, and you have just proven it is solved.
                fontSize = 18
            }
        }
    }
}

