        {
            name = RelayBravoDeployment
            type = VesselParameterGroup
            title = Phase 4: Relay Bravo - Separate and Circularize
            completeInSequence = true

            vessel = Duna Relay Bravo

            PARAMETER
            {
                name = NearStation
                type = Rendezvous
                vessel = Duna Science Station
                distance = 18000000
                title = Depart
                hidden = true
            }

            PARAMETER
            {
                name = NearAlpha
                type = Rendezvous
                vessel = Duna Relay Alpha
                distance = 18000000
                title = Depart from Relay Alpha
            }

            PARAMETER
            {
                name = BravoCircularOrbit
                type = ReachSpecificOrbit
                targetBody = Duna
                title = Bravo: 500km Circular Orbit
                deviationWindow = 3.0
                index = 1
            }

            PARAMETER
            {
                name = BravoHasAntenna
                type = HasAntenna
                antennaType = RELAY
                minAntennaPower = 3900000
                title = Long-range relay antenna
            }

            PARAMETER
            {
                name = BravoHasPower
                type = PartValidation
                partModule = ModuleDeployableSolarPanel
                minCount = 1
                title = Power generation
            }

            PARAMETER
            {
                name = BravoStabilize
                type = Duration
                duration = 10s
                preWaitText = Bravo orbit stabilizing
                waitingText = Binding Relay Bravo
                completionText = Relay Bravo bound. Node 3 confirmed. Triangle complete.
            }
        }
    }

//==========================================================================================
// DIALOG - Instructions delivered between sequence steps
//==========================================================================================

    BEHAVIOUR
    {
        name = ConstellationDialog
        type = DialogBox

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = NearStation
            position = CENTER
            title = Why This Orbit Works
            titleColor = #2196F3
            width = 0.5

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }

            TEXT
            {
                text = Before you do anything, I want to explain why this orbit works.\n\nYou already know high orbits are slow and low orbits are fast. That is just experience at this point. But there is a number hiding in that intuition. For three satellites 120 degrees apart, the carrier needs to arrive at periapsis exactly one third of an orbit late on each successive pass. That means its period needs to be four thirds of the final orbit period. Not approximately. Exactly.\n\nFour thirds of 2 hours 21 minutes is 3 hours 8 minutes. That is your resonant period. Kepler's Third Law converts that period into an apoapsis altitude of 847 kilometers. The orbit shape is not something you choose. It is something you calculate. Periapsis stays at 500km. Apoapsis rises to wherever the timing requires.\n\nThe orbit does the geometry. You just have to execute the sequence.
                fontSize = 18
            }
        }


        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = StackResonantOrbit
            position = CENTER
            title = Resonant Orbit Confirmed
            titleColor = #2196F3
            width = 0.45

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_thumbsUp
            }

            TEXT
            {
                text = Good orbit. You are coming up on periapsis.\n\nSeparate Alpha and burn retrograde to circularize at 500km. Bravo stays with the stack. Let it ride the full resonant orbit back around before you separate. One more pass and the geometry puts it exactly where it needs to be.
                fontSize = 18
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = BravoResonantHold
            position = CENTER
            title = Constellation Operational
            titleColor = #4CAF50
            width = 0.45

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_thumbsUp
            }

            TEXT
            {
                text = Bravo is back at periapsis, 120 degrees from Alpha. Separate and circularize. Same burn, same altitude.\n\nTelemetry is clean across all three nodes. When Bravo settles into position the network is fully operational. Full Duna system coverage online.
                fontSize = 18
            }
        }

                DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = ConstellationSequence
            position = CENTER
            title = Constellation Operational
            titleColor = #4CAF50
            width = 0.45

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = true_thumbsUp
            }

            TEXT
            {
                text = Triangle confirmed. Full Duna system coverage.\n\nStation, Alpha, Bravo - 120 degrees apart at 500km. That blackout you experienced during Strange Signals? It won't happen again.\n\nThe system is connected.
                fontSize = 18
            }
        }
    }
}

//==========================================================================================
// PATHFINDER PROGRAM - PHASE 2: IKE DEPLOYMENT
// Mission 4c: "Site Selection"
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Mission4c_IkeSurvey
    title = Pathfinder 4c: "Site Selection"

    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Resource Survey Division\nTO: Mission Control\nSUBJECT: Pathfinder Program - Ike Resource Survey\n\nThe station is operational. The relay network is going up. Before ISRU deployment can proceed, we need to know where to land.\n\nDeploy M700 survey scanner to Ike polar orbit. Complete surface resource mapping. The scanner identifies subsurface ore concentrations - you are looking for high-value sites with accessible terrain. Ike's surface is uneven in places. Pick somewhere flat.\n\nYou did this at Mun and Minmus. Same technology, higher stakes.\n\nReview the survey data and select a deployment site. Mission 4d puts the ISRU rover there.

    synopsis = Deploy M700 survey satellite to Ike polar orbit and complete surface resource mapping. Survey data informs ISRU site selection for Mission 4d.

    completedMessage = Ike resource survey complete.\n\nM700 mapping data transmitted. Review the overlay and select your deployment site before committing to Mission 4d - the ISRU rover goes where you land it.\n\nSurvey satellite remains in polar orbit as permanent resource monitoring infrastructure.

    agent = Kerbal Initiatives Division
    group = Pathfinder

    minExpiry = 0
    maxExpiry = 0
    deadline = 1825
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Significant
    maxCompletions = 1
    maxSimultaneous = 1

    REQUIREMENT
    {
        name = CompletePathfinder4
        type = CompleteContract
        contractType = PF_Mission4_Departure
    }

    advanceFunds = 40000.0
    rewardFunds = 150000.0
    rewardScience = 150.0
    rewardReputation = 20.0

    targetBody = Ike

    DATA
    {
        type = bool
        pathfinder_mission4c_complete = true
        persist = true
    }

//==========================================================================================
// OBJECTIVES - IKE POLAR SURVEY
//==========================================================================================

    PARAMETER
    {
        name = IkeSurveyOperations
        type = VesselParameterGroup
        title = Deploy M700 Survey Satellite to Ike Polar Orbit

        PARAMETER
        {
            name = IkePolarOrbit
            type = Orbit
            targetBody = Ike
            minInclination = 80
            maxInclination = 100
            minPeA = 10000
            maxApA = 60000
            title = Achieve Ike polar orbit (80-100° inclination, 10-60km altitude)
            hideChildren = true
        }

        PARAMETER
        {
            name = HasM700Scanner
            type = PartValidation
            part = SurveyScanner
            minCount = 1
            title = Must have M700 Survey Scanner
            hideChildren = true
        }

        PARAMETER
        {
            name = HasPower
            type = PartValidation
            partModule = ModuleDeployableSolarPanel
            minCount = 1
            title = Must have power generation
            hideChildren = true
        }

        PARAMETER
        {
            name = SurveyOrbitHold
            type = Duration
            duration = 2m
            preWaitText = Stabilizing survey orbit
            waitingText = Survey orbit confirmed - activate M700 scanner
            completionText = Survey satellite in position. Activate the M700 and review the ore overlay before proceeding to Mission 4d.
        }
    }

    PARAMETER
    {
        name = ReachIke
        type = ReachState
	targetBody = Ike
	situation = ORBITING
	hidden = true
	//Triggers Ike Approach Dialog upon capture
    }

    BEHAVIOUR
    {
        name = IkeArrival
        type = DialogBox

	DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = ReachIke
            position = CENTER
            title = Ike Approach
            titleColor = #FF6B35
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = Ike expedition is in the system. When you are ready, begin your survey approach.\n\nIf the relay network is not yet operational, hold the surface operations until it is. The survey can run from orbit in the meantime. An uncrewed vehicle caught in a blackout during landing or ascent has no control authority. It will continue to hang in the sky in much the same way that bricks do.
                fontSize = 18
            }
        }
    }
}

//==========================================================================================
// PATHFINDER PROGRAM - PHASE 2: IKE DEPLOYMENT
// Mission 4d: "Resource Operations"
// Chapter 1 Finale
//==========================================================================================

CONTRACT_TYPE
{
    name = PF_Mission4d_IkeISRU
    title = Pathfinder 4d: "Resource Operations"

    description = Mission Computer Terminal: Kerbal Space Center Operations Division.\n\nFROM: Kerbal Space Center - Resource Utilization Division\nTO: Mission Control\nSUBJECT: Pathfinder Program - Ike ISRU Operations\n\nSurvey complete. Site selected. This is the last piece.\n\nDeploy the ISRU rover to your chosen site on Ike. Run the drills. Fill the tanks. Then deploy the cargo lander to the same location and complete the surface transfer cycle. When the lander's tanks are full, the Duna system is no longer dependent on Kerbin for fuel.\n\nYou ran this cycle on Minmus. Same equipment, same sequence, different stakes. There is no rescue mission if something goes wrong out here. The station crew is watching the telemetry.\n\nDeploy. Extract. Transfer. The rest is yours.

    notes = Deploy the ISRU rover to your M700-selected site. Run extraction operations until ore tanks are full, then process fuel. Deploy the cargo lander nearby and complete surface docking and fuel transfer.\n\nThe lander's destination after this mission is not specified. That decision is yours.

    synopsis = Deploy ISRU rover and cargo lander to Ike. Complete surface extraction and fuel transfer cycle. Establish resource independence in the Duna system.

    completedMessage = Ike ISRU operations confirmed. Surface fuel transfer cycle complete.\n\nStation operational. Relay network live. Survey complete. ISRU running.\n\nThe Duna system sustains itself now. Fuel from Ike's surface. Crew at the station. Eyes on the sky.\n\nThis is what the Pathfinder program was building toward. Every mission from Rubicon 1 to this moment was a step toward standing here - at another world, with the infrastructure to stay.\n\nRed Frontier Chapter 1 is complete.\n\n\The Duna system is yours and there is plenty left to explore. We will see you out there.

    agent = Kerbal Initiatives Division
    group = Pathfinder

    minExpiry = 0
    maxExpiry = 0
    deadline = 1825
    cancellable = true
    declinable = false
    autoAccept = true
    prestige = Exceptional
    maxCompletions = 1
    maxSimultaneous = 1


    REQUIREMENT
    {
        name = CompletePathfinder4c
        type = CompleteContract
        contractType = PF_Mission4c_IkeSurvey
    }

    advanceFunds = 80000.0
    rewardFunds = 500000.0
    rewardScience = 400.0
    rewardReputation = 75.0

    targetBody = Ike

    DATA
    {
        type = bool
        pathfinder_mission4d_complete = true
        persist = true
    }

//==========================================================================================

    PARAMETER
    {
        name = ISRUOperationalCycle
        type = Sequence
        title = Ike ISRU Operational Cycle

        hiddenParameter = FuelProduction
        hiddenParameter = DeployCargoLander
        hiddenParameter = DockRefueling

//==========================================================================================

        PARAMETER
        {
            name = RoverDeployment
            type = VesselParameterGroup
            title = Deploy ISRU Rover to Ike Surface
            define = Ike ISRU Rover
            notes = Land the ISRU rover at your survey-selected site. Deploy drills and begin extraction.

            PARAMETER
            {
                name = LandOnIke
                type = ReachState
                targetBody = Ike
                situation = LANDED
                hidden = true
            }

            PARAMETER
            {
                name = ConfirmLanding
                type = ReachState
                situation = LANDED
                targetBody = Ike
                completeInSequence = true
                hidden = true
            }

            PARAMETER
            {
                name = HasDrill
                type = PartValidation
                partModule = ModuleResourceHarvester
                minCount = 1
                title = Must have drilling equipment
                hideChildren = true
                disableOnStateChange = true
            }

            PARAMETER
            {
                name = HasConverter
                type = PartValidation
                partModule = ModuleResourceConverter
                minCount = 1
                title = Must have fuel processing system
                hideChildren = true
                disableOnStateChange = true
            }
        }

//==========================================================================================

        PARAMETER
        {
            name = OreExtraction
            type = HasResource
            resource = Ore
            minQuantity = 300.0
            title = Extract 300 units of ore from Ike surface deposits
            disableOnStateChange = true
            hideChildren = true
        }

//==========================================================================================
        PARAMETER
        {
            name = FuelProduction
            type = VesselParameterGroup
            title = Process Ore into Fuel
            completeInSequence = true

            PARAMETER
            {
                name = LiquidFuelProduction
                type = ResourceTransfer
                resource = LiquidFuel
                fractionMin = 0.95
                title = Fill Liquid Fuel tanks
                hideChildren = true
            }

            PARAMETER
            {
                name = OxidizerProduction
                type = ResourceTransfer
                resource = Oxidizer
                fractionMin = 0.95
                title = Fill Oxidizer tanks
                hideChildren = true
            }
        }

//==========================================================================================
        PARAMETER
        {
            name = DeployCargoLander
            type = VesselParameterGroup
            title = Deploy Cargo Lander to Rover Site
            completeInSequence = true
            define = Ike Cargo Lander
            notes = Land the cargo lander within docking range of the ISRU rover. The lander carries no drill - it is the transport half of the surface logistics pair.

            PARAMETER
            {
                name = Rendezvous
                type = Rendezvous
                vessel = Ike ISRU Rover
                hidden = true
		distance = 500
		title = Land within 500 Meters of the Rover
            }

            PARAMETER
            {
                name = HasOreStorage
                type = HasResourceCapacity
                resource = Ore
                minQuantity = 300.0
                title = Minimum 300 units ore storage capacity
                hideChildren = true
                disableOnStateChange = true
            }

            PARAMETER
            {
                name = LanderRendezvous
                type = Rendezvous
                vessel = Ike ISRU Rover
                distance = 10
                title = Land within docking range of ISRU Rover (10m)
            }
        }

//==========================================================================================

        PARAMETER
        {
            name = DockRefueling
            type = All
            title = Dock with ISRU Rover and Fill All Tanks
            completeInSequence = true

            PARAMETER
            {
                name = SurfaceDocking
                type = Docking
                vessel = Ike ISRU Rover
                vessel = Ike Cargo Lander
                hideChildren = true
            }

            PARAMETER
            {
                name = LanderTanksFull
                type = VesselParameterGroup
                title = Fill Lander Tanks from Rover Production
                vessel = Ike Cargo Lander

                PARAMETER
                {
                    name = OreFull
                    type = ResourceTransfer
                    resource = Ore
                    fractionMin = 0.95
                    title = Ore tanks full
                }

                PARAMETER
                {
                    name = LiquidFuelFull
                    type = ResourceTransfer
                    resource = LiquidFuel
                    fractionMin = 0.95
                    title = Liquid Fuel tanks full
                }

                PARAMETER
                {
                    name = OxidizerFull
                    type = ResourceTransfer
                    resource = Oxidizer
                    fractionMin = 0.95
                    title = Oxidizer tanks full
                }
            }
        }
    }

//==========================================================================================
// DIALOG - Chapter 1 Finale
//==========================================================================================

    BEHAVIOUR
    {
        name = IkeOperationsDialog
        type = DialogBox

        DIALOG_BOX
        {
            condition = CONTRACT_ACCEPTED
            position = CENTER
            title = Resource Operations
            titleColor = #2196F3
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = The survey data is in. Before you commit to a landing site, read it carefully. The high concentration zones are clearly marked, but the empty regions are not just low yield, there is nothing there worth drilling. Pick a site in a dense cluster and confirm the terrain is workable before you descend. Ike is uneven in places.\n\nThe sequence from here is the same one you ran at Minmus. The rover goes down first, drills and processes, and waits. The cargo lander meets it on the surface, takes on the full load, and prepares to return to orbit. Detailed steps are in the mission notes.\n\nThis is the last piece. Get it running.
                fontSize = 18
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = LanderTanksFull
            position = CENTER
            title = The System is Running
            titleColor = #FF9800
            width = 0.5

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_nodA
            }

            TEXT
            {
                text = Fuel from Ike's surface is in the lander. The cycle is complete.\n\nStation in Duna orbit. Relay network operational. ISRU running on Ike. Every element of this system was designed, validated, and deployed as a single coherent program, and it is all running right now.\n\nThis is what Pathfinder was built to achieve. Well done.
                fontSize = 18
            }
        }
    }
}
