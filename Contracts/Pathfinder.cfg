                text = Both transfer stages confirmed full. You are clear to plan your ejection burns.\n\nThe station goes to a low equatorial orbit around Duna. That placement is deliberate, the relay constellation deploys from the station, and equatorial geometry gives the network reliable coverage across the whole system. You will have good access to Ike and most of Duna's surface from that orbit. Duna's polar regions are the exception, but that is a problem for another day.\n\nThe Ike expedition wants a mid-inclination orbit on arrival, around 45 degrees. The scanner will need a correction to reach full polar coverage, but the surface assets can reach most of the surface efficiently from there. Plan those capture burns before you commit to the window.\n\nWhen you are ready, burn for Duna.
